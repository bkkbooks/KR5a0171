body:
  text: 吾先奉玉帝敕授以如意飛鸞墨迹于天地之間也救末劫爰命梓潼君也今吾之九十余生之化故命于勿于堅重校勘此文今已周矣請命於吾親跋于後耶九十余生闡化機扶生拔苦拯災危證果梵迦如來藏再出神文福他時吾孝友也勿堅二生吾文已就重出斯寶如意持之萬里古語云千鍾馬金厥有名一朵雲生腳下登三天高臺入地去一枝消息泄春靈此中造化藏千里可否人生在此中二生知機否緣事將成信有時人能弘道復何疑不因百尺樓工畢爭得多生事迹垂典實任從譏衒耀始終庶可見云為從今又被人間世傳出清河百詠詩
  hash: sha256:a52a0a4ab74e0bea16bc5379075da7d3ca468c14e64b32dd24d3560e3914ca09
