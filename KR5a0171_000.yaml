front:
  text: 梓潼帝君化書序騰七化有二理有變化之化有教化之化自無入有自昔為今以幼壯為老死以老死為嬰稚此變化之化也三綱五常是非邪正上以風動其下下以獻替其上此教化之化也今吾所降前後九十七化元命者序太始也流形者本太質也生民者明性習也易俗者變夷禮也稽古者覺後知也奉真者遵道法也寧親者報劬勞也幽婚者戒苟合也淵石者重有子也馴雉者誠感通也回流者護先塋也降瘟者顯籙驗也好生者習醫業也天官者醫業成也薦賢者公道開也格非者和聖賢也榮歸者知止足也敦宗者念本支也歸寂者遇釋法也君山者喜幽清也感生者不能忘情也奉先者思繼志也孝友者繼絶緒也沔水者社讒慝也白駒者冀留賢也舉讎者忘私憾也恤孤者敦友義也慈訓者傳內觀也盡忠者堅臣節也棲真者屆雪山也山王者始護蜀也刑賞者罰淫而舉孝也存褒者憫無辜也回風者罪狂夫也明寃者恤無告也苴邑者滋生齒也拯溺者善賢侯也雨穀者惡私心也曲雨者惠小民也殞賊者旌孝婦也北郭者誨求嗣也返火者敗姦計也平苴者現陰佑也費丁者賤勇力也石牛者惡好財也五婦者諫重色也顯靈者不忍蜀之亡也大丹者遇聖師也巴都者嫉贓汙也婆娑者明天性也戒龍者和鄰祇也鳳山者尊所生也魚腹者矜老苦也口業者彰惡報也東郭者懲巧偽也牛山者分善惡也天威者戒逆婦也尚義者貴同氣也旌隱者厚士風也佑正者高烈女也殺生者遠疱厨也酷虐者戒害物也憫世者念黎元也咸陽者奉帝命也卭池者報父母也解脫者謂寃不可成也仁政者悟前非也幽明者戒欺暗也籌帷者償宿業也如意者大有為也丁未者兆命佐聖也水漕者司天澤也桂籍者司文衡也孝廉者濟太平也感時者悼王化也神扶者顯八公山也誅暴者戒汙吏也明經者顯先聖也護聖者顯大功也明威者戒士夫不欺也濟順者奉帝保民也濟迷者懲不信也忠顯者佐皇國也聖治者歌太平也摽忠者濟時也興國者忠良也止足者辭王旨也訓逆者誅不孝也戒欺者正名也誅悖者勸孝也真元者拯難也拔苦者悼亡也福瀘者平夙寃也昭明者見畢工也摩維洞天者顯後化也放生者戒殺魚子也弭蝗者拯救萬民苦也是故聖人神道設教始有天人相因人神共理之化要其所歸不過垂世立教之大端也延祐三年春中書因太常定議根豫自周歷晉之出沒原古迄今之事業録豫為忠國孝家益民正直祀典之神閲豫舊封神文聖武孝德忠仁王崇褒為輔元開化文昌司祿宏仁帝君因豫靈應廟額表曰佑文成化之祠徽號益彰汗顔愈熾每思所以禆益公道輔治皇元者其迹淺陋不足稱述聊以豫所化之實自為一書以答綸音之萬一允以道業誨人者謂之教躬行於上風動于下謂之化風化之源在乎風化之主考其事之美惡則知化之所由淳朴既衰民心不古刑政極而鬼神化焉蓋天下之民淪綱毒法逭于朝典者必受冥誅古今昭昭綽有常憲故官府治民神祇理世一也要在明教化示斯民遷善遠罪耳奈何幽明殊塗隱顯異勢聲迹既不能相接雖有教化令典將何舉而示民哉此冥冥中理世尤為力之難也豫素知此義故曲為神人交接之術與承職百靈共白于帝作飛鸞闡化之法筆降人間為幽明通貫之埋仰蒙帝意仁愛下民允從奏議故豫往歲已曾宣傳化迹其事雖若自侈此身作為之實然化迹之傳亦顯教明法示人遷善遠罪之微意其於淑人心善風俗力挽頽波捨此則何以哉比者欽蒙上帝誕降嘉命賜以二十一司官屬明具所職俯治下方一則俾贊襄天府生成之功一則俾密資聖朝平治之隆也疊承寵光罔敢逸墜孜孜弗逮于兹有年矧豫化書九十七帙布在人間久矣濫觴于腐儒之手以魚為魯以根作銀碔玞混石玉者衆矣不訂照以示人彼將曰好事者附會妄誕尚鬼神耳羣疑之中得貞確端懿之士某等為吾反覆辨校南北二本式質鬼神豫命之曰比者南本則厞實多北本經豫親校事實詳明斷自丁未化前更定舛訛桂籍化後刪改繁亂豫又增及蘇民化科舉化為九十有九姑虛其文以存後意俾正校者梓木傳行以示來哲庶無疑妄人之言曰聖人神道設教九經並明日月博雅君子代不乏人典明教化猶不能家喻户書何區區化書之帙能砥柱于中流耶鳴呼其亦不思而已矣化之所存道之所存也居官者覽豫化迹若是之嚴忠廉幹濟之心未必不凛凛也文人儒士觀是化之終始知赫赫之若臨未必不祇懼修省農工商賈雜家者流聞千百載之駭聞欺心者獲天誅口業者被神戮善有賞惡有罰未必不寒心竦毛遷善改過習釋道者知劫運果報之昭昭未必不全其心而蹈其矩奚啻頑夫廉懦夫立耳鄙夫之言曰子不語怪力亂神何怪神之多多此非時中之人斯不可語上也斯守白公之信也豫之匡人于修齊治平之途非左道之術耳斯化也雖不能與天地立心與生民立命與後化也雖不能與天地立心與生民立命與後世開太平識者未必不知豫心之輕重也若夫豫之神在天下若日月之運于天豫奪嗣祿職掌文衡天下小大事端靡不該括吁回風返火既行之于往雷勵風飛不能行之于今耶咨爾天民體豫至意立仁義于詩書之圃策忠孝于廉讓之鄉共躋仁壽同樂太平幸也否則恭行天罰及悔何追豫忝膺重寄恐負天子寵光故此為敘
