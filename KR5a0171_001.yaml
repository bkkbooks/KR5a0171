body:
  text: 元命第一混沌初分濁與清東南分野景鮮明中含太一氤氲氣吾已潜符造化精獨占辰宫雙女上兼司火德五行情率然自猒居荒落脫蛻終期道果成吾本吳會人生於周初迄今七十三化矣流形第二遁跡靈巖不記秋目光開閉自剛柔吞霞滿腹無飢渴養息潜真任去留數足轉形歸孕乳時來隨分事王侯會稽勝地堪揚化張氏生身世屬周豫方遊人問忽至會稽之陰見一隱者年五十許具香燈仰天而祈時中春丙夜天文焕爛張翼二宿昭然在上俯而聽之隱者姓張適符列宿豫於是生焉生民第三北堂一夕夢吞珠隱隱襟懷震肅初厥月誕彌延穀旦靈光克滿耀籧廬儼思不與羣兒戲嗜學仍於百慮疏耆舊相逢每相許謂吾他日是鴻儒張氏出黃帝之子名揮始造弦矢張羅網世掌其職子孫因以張為姓顯於吳易俗第四吳因泰伯遺風後一變民情似島夷剪髮務從安澤國文身將以禦蛟螭性情不願隨時俗冠履惟思習禮儀始也親朋嫌矯飾終焉鄉里翕從之豫之鄉剪髮而文身蓋便於入水而習成夷俗也豫既成童矣心所不樂乃尋冠屨自習禮文內外莫不以豫為異及其久也從豫而化者十有七八焉稽古第五三吳僻處在天涯文物無稱少麗華帝典未嘗傳遠裔皇文那得到農家幸因膚使傳縑素頓悟卑情識制麻從此一方絃誦美區區風教已堪誇豫鄉距京周甚遠文物無稱一日有耆舊謁吾父者口誦唐虞大訓數篇曰有中國使人傳此豫好之就彼習焉隨口記授無遺於是邑人願學者從豫習之皆以豫為師奉真第六寂寂茅茨晝掩門行人稀到水邊村深耕偶得黃金像久瘞猶纏紫葛根不忍鉟鎔虧體質聊將焚獻度朝昏送歸海嶠禳灾沴一境生靈賴庇恩豫之居事畎澮忽於鋤下得一金像頂冠如崇山叠聳被服如霞綺舒麗紺眉月面儼然慈祥憑几巍座荷花為臺高尺許重鈞餘初未知為何神詢之故老或曰元始天尊像也昔夏禹理水冶金為神用鎮方嶽豈此像之類乎吾家素貧雖迫於衣食而不敢起鉟鎔之心一日海風翻浪遠邇奔駭非人力可支豫謂衆曰家有金像得之儻來今為衆捨之以祈海若洎于安息乃率衆乘高以像投狂瀾中俄然風止潮回一境獲免邑人以是為德也皆以糗糧布帛見謝拒之不能自是溫溫然家道苟合矣異時記憶投像之所蹤跡之沙磧有光掘出舊像仍載歸築宫室安奉邦人敬事之寧親第七母氏劬勞歲月深風寒暑濕久相侵醫巫診視皆無效針炙頻仍殆不任剔股和羹償宿願吮疽出血本誠心分明夜聽天神語一紀延生表至諶豫既冠母氏六旬矣少時勤於織絍飲食失時嘗致疾疹逮此衰暮重之以六氣所淫遂成大苦疽發於背始以巫覡祈禱中更醫工砭劑月餘皆不效豫不離卧內日夕省視未嘗解衣而息計窮矣乃為吮疽出大膿血疾少間醫曰疽根附骨未易出也越三日復吮之忽覺口中充滿吐而視之有膜如綿纊膿乳如米粒母氏漸安而以病缺食少復成羸瘵醫曰此痼疾矣以人補人真補其真庶可平復豫因夜中自剔股肉烹而供之忽聞空中語曰上天以汝純孝延爾母一紀之壽翌日勿藥果符神言幽婚第八婚對由來不等間此生期遇是前緣靈骸不朽如相待清夢重遊豈偶然嗣子已堪傳後業芳魂俄復掩重泉壯年頓絶陰陽事衆議稱豫骨是仙吾少也賤性靜而寡合年逾冠矣未有室家非特良媒之不至抑亦豫無好逑之心也嚮因母氏嬰疾以未見孫息為恨豫亦有不孝之憂一夕夢至林麓孤冢巍然旁有一門一女子靚粧而坐其中顧豫而語曰君非張善勳乎豫訝其以名見斥也請其由女曰妾與君雞犬相聞乃仲氏也曩者妾之叔父與君家會談君之美以為好學尚禮古君子也議以妾歸於君吾父以君貌寢而難之然妾之慕君心已一矣後許於鐘安孺鍾富家子而清議無聞妾心恥焉由此得疾而終今三年矣妾之來此以君之故君曷為我圖之豫悸而悟月餘再夢如初暇日因與友人儀堅成縱步尋幽忽至一所宛然夢中境也方告吾友共訝之冢中人出呼豫為郎蓋夢中所見者也儀實仲之舅家因走告仲氏之父母迎女以歸卒為婚姻云淵石第九春光淡淡景遲遲春水溶溶淺且漪羅綺岸邊搖倒影神仙衆裏悟前知白文細篆成淵字青石圓形似小龜生子立名符感兆貴知天與自無私仲氏婚三月鄉人士女已嫁而未孕者相與臨神潭摸石得石者宜男得瓦者宜女蓋舊俗也仲預遊人中吾母謂仲曰潭水靜深黝然莫測宜從上流淺處求之仲方徘徊潭中忽起花沫如吹仲以手捫之得一石大如雞卵六出如龜狀青而白文隱隱如淵宇意感而有孕既生子名之曰淵石方齠齓仲忽告豫曰吾兒真如君耳宜善視之妾與君世緣盡矣語畢而逝豫乃不復再醮馴雉第十天摧地裂情堪擬荼毒無門救二親負土培墳酬怙恃寢苫枕塊益悲辛黃泉路隔嗟何及白雉情傷亦自馴禮制三年情罔極節哀于以率中人豫年三十有六歲在作噩疫毒流行人無免者鄉邑蕭條路無人跡豫父八十有五母七十有三盛暑中皆得疾同日而逝於是自持畚鍤以營大事乃於路傍倚廬枕塊以終三年常有白雉一雙棲於林上每遇祭奠飛鳴而下俯仰咿啞如欲言者及終制而去回流第十一壘築墳岡不憚勞何期平地發波濤松楸欲變無何有棺槨猶憂不可逃大洞仙經除厄難真金聖像鎮鯨鰲秋霖已霽湍流息喜見平田廣且高豫考妣墳岡去居之南止百餘步蓋一時忽遽卜之云吉自以為便於省視初不遑他恤也葬之五年墳西三十里洪水暴發平陸成溪以墳為岸水源不竭勢頗峻急吾心懼焉欲改葬之無及矣乃齊戒守墳日夜誦大洞經不輟併取家藏金像而嚴事之洎於無虞次年秋雨霖霪傍溪湧漲數流為一吾益恐及水落視之則墳前溪谷變成堅隴廣一里餘自是松楸無害矣降瘟第十二雙親之死為瘟災切骨銜寃痛且哀生續恩隆情不匱幽明路隔憤難開神兵執崇明中現法籙傳真夢裏來落筆成符救民瘼豈容五鬼暫徘徊豫之二親皆死於瘟時暑嬰毒荼苦滋甚每念瘟鬼之酷恨之切骨而幽明路殊力不能報心嘗怏怏焉比因墳岸回流實自大洞真經金像之力於是益勤持誦而敬事之洎獲陰祐以治瘟鬼又三年忽夢所事金像語豫曰大洞仙經爾熟記矣大洞法籙爾未見也今當授汝以治邪魔非惟可以契汝初心亦可佐天行化助國救民也袖中出書二豫百拜而授之既覺書在枕前其一曰大洞籙又一曰大洞法因開籙書讀之至天騶甲卒一萬人度之句忽風雷晝暝金甲朱綬者無數列于豫前俯而請命三人持紅旌立於衆先白豫曰願聽使令豫方恍惚不覺厲聲謂之曰吾令汝等治瘟鬼此鄉某家闔門病瘟為吾驅來語畢一持旌者領百餘人入其家俄頃執鬼使五人出有蒙虎皮者冠雄雞者貌苦人者若鵠頭者若驢頭者所執者水火羽翣斧鑿之具豫怒而叱之將滅其形彼乃有辭曰弟子等歲運所生歲氣所成所遊有方所病有人陰譴重者受其災天命絶者致其死亦非弟子等敢私若蒙真官賜以寬貸此後願聽約束遇有行瘟見真官符籙所在即不敢至矣豫因依法授以教勑而去閭里有病瘟者豫與之符法皆得全活好生第十三風寒暑濕因天變飲食興居病在人黃帝脉經詳子母神農藥性辨君臣撫摩針炙隨輕重補瀉椎移有故新但得天民無橫夭勤勞不恤此心真豫以法籙救人疾疢衆矣遠近之人踵門求治者不可以數計其有染瘟病者著邪崇者受廬痢者逢殃魂者遭鬼擊者神者惡氣者一一全活然有臟腑冷熱虛實之不齊飲食起居勞佚之各異或因喜怒哀樂而感於內或因風寒暑濕而受於外此皆岐伯神農氏之學非道家法籙之事也人有懇於豫而不能全其生豫實赧然不足於是講究脉理玩味藥性討論五行之勝復習熟九針之法迎隨勤苦六年始達其妙自是天命未絶者無橫夭矣天宫第十四作善家庭秖自憐不期聲譽乃喧傳名聞王國心無愧位列天官事有緣六氣和平方晏粲萬民疾苦易安全當年稱職吾何力君相明良化使然豫活人衆矣聞於君上方以砭劑為事而又為京周所知馹召至都既以國君所薦又歷試之以豫為醫師掌萬民之疾苦隸於天官豫甘心焉於是教戒徒屬使勤其業蓋成王之世也時其王畿豐稔六氣和平民少扎瘥之疾良由上德之所致使豫得以稱職焉薦賢第十五人之有善如吾有已達仍思未達人大智潜心能創物妙方治疾可通神推賢汲汲誠無隱自代區區意本真奏徹宸聰蒙上賞驟升諫列作臣鄰豫之屬有瘍醫公孫智叔者賦性慈慧而記問詳博深明百藥之性味創造丹砂雄黃礬石磁石石膽為五毒之劑其說蓋取丹砂養血而益心雄黃長肉而補脾礬石理脂膏而助肺磁石通骨液而壯腎石膽治筋而滋肝外療瘡瘍之五證內應五臟拘之以黃堥熟之以火候藥成傅瘍無不神效乃以其法著于世則豫自以為不如而彼居豫下因舉智叔自代使兼豫職無幾上躬不豫鬢有疽生一夕訌潰厥勢危殆以前藥傅之應手而差於是智叔始有醫師之命以豫直情無隱所薦得人宜膺上賞遷為司諫格非第十六太醫活國利非輕暝眩輸忠政乃成形迹相忘疑自釋樞機不密禍由生微言忍使彰君惡削藁何妨隱直名但得聖朝無過舉不辜榮祿是真情王若曰咨爾善勳直情無隱朕念良醫活人大醫活國今置爾言路以旌汝賢汝其以救疾之心救正吾失鳴呼惟良藥苦口而利於病忠言逆耳而利於行爾往欽哉毋易所守豫三辭而後受之既預七人之列日近清光雖君相聖明無大過失而豫愛君憂國之心一步趨一食息未嘗少懈也成王幼沖之時聽政于周公及親政事久矣嘗有不平之語豫恐左右得以乘間也每以君臣始終禍福幾微為戒而諫草屢焚人無見者故公之東征雖有四國流言召公不悅之隙而終能保全蓋豫亦少有力焉榮歸第十七十年膴仕拋桑梓一旦榮歸復里閭嗣子丱童驚辨服田園蹊徑訝丘墟遊仙夢覺空勞擾涉世情疏自卷舒再識北窗春睡美任從雞唤五更初豫在京周十年久違桑梓倦翼思還每念怙恃無恙時身在草莽及所天既失乃受榮祿雖食稻衣錦何樂之有一日見周公鷗梟之什惻然有感於是起歸歟之興告老乞骸之請數上始從其欲公卿士夫設祖席東門之外既歸里人迎候豫乃自近郊舍車而徒鄰曲以豫為榮敦宗第十八宗人本是一根生貧冨誠難較重輕祿廩倘來何足吝親朋至此若為情死生並與周婚葬俊秀仍須為作成他族聞風喜相效三吳漸有義莊名張有數族居多貧窶豫歸之後遍求訪之幼者已壯少者皆老生死榮悴惻然可驚其貧不能自振者猶故也於是興起義莊以淵石主之貧困者周給之病者醫藥之男女成長者婚嫁之子弟俊秀者教養之他族聞風翕然相效義莊滋廣習俗成美矣歸寂第十九聞說西方大聖人苦空寂滅以為真行歌自信浮雲喻坐想徒勞夢幻身得訣坦然超彼岸忘言聊以谷吾神從兹始悟歸根埋南北東西任屈伸豫之在朝也聞方外之言曰西方之國有大聖人古皇先生者不言而自化無為而自理以慈悲為主以方便為用以齊戒為常以寂滅為樂視死生如朝暮等恩讎如夢覺無憂愁忿懫之情蓋知浮生不久求於無生者也豫嘗慕之及辭榮而歸道逢隱者行且歌曰朝陽之暾觸石生雲初焉髣佛已而繽紛隨風而出蕩漾無垠俄變化以歸盡杳不知其所存伊仕者之利祿忘其勞而駿奔忽暮景之見迫向大限兮逡巡將投足於幽趣為異類兮藝藝豫聞之始也駐車而留聽少焉憑軾以敬禮終乃下車而泣謝謂之曰適聆妙理深契愚衷願惠格言以度殘喘乃於通衢百拜而力懇之行歌子仰天而嘆指豫以心印授豫以正訣曰此西方大聖古皇先生歸寂法也子能念而習之可度生死死而不亡證無量壽果終於彼岸則可成正覺中道而廢則猶能擇地而處可為神仙豫授教焉於此塵緣既畢百慮頓灰時丁灝秋會集親友留頌而逝頌曰秋風瑟瑟秋月白白吾得之真知身是客君山第二十君山一境最清幽鶴馭徊翔為少留湖景昏明從晝夜林光疏密任春秋無身不顧千年藥有道誰貪百里侯極目煙波供受用飽聽欵乃看夷猶豫既遷化將往西方適至洞庭君山之上愛其勝境因少留焉于時上無君相臨制之威下無血屬係纍之念超然物外獨往獨來水光山色四時可愛吟風嘯月此樂何窮追思前事殆一夢耳方且仙遊勝侣朝夕往還不聞塵境之勞生但見洞天之真逸久之有二青童自天而下敬宣帝㫖以豫為君山主宰兼洞庭水治梓潼帝君化書卷之一
