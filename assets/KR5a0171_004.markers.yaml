  - {type: variant, offset: 9417, length: 66, content: 宫啇大道中興踵後芳道德五千消劫運乾坤億載福金湯黍官景運重宣化蘂笈靈文再闡揚正一玄科振寰海永延皇祚壽無疆予遊宴玉京怡眞靜默每念龍虎嗣漢, CK-KZ: 移整於瀘以全蜀本渝嘉以下苟活生根皆余}
