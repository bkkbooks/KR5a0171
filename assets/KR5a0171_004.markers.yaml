  - {type: indent, offset: 4311, content: 　, id: KR5a0171_krp_004-bkkind81}
  - {type: variant, offset: 4311, length: 0, content: '', CK-KZ: 神扶化淸河爲晉拯艱難堪笑符堅逞厥奸帝命神孫摧北敵祖爲賢相起東山濳機勝敗知前定報㨗音書謾往還試問八公諸草木史中功烈甚班班余父淸河府君念晉氏皆黃帝之裔其後陵遲欲降生於世而匡救之禀玉晉而生於謝氏於建興中故府君㩦余二子曰淵石曰懋陽遞生於諸謝余父高卧東山爲蒼生而起二子乃石也符堅拒權翼等諫率兵九十七萬東西萬里水陸齊進㓂邊孝武皇帝方將謀帥余父曰惟兄之子可當此任卽遣石及子琰等都督水軍七萬拒堅於夀春堅登城而望晉軍部陣其嚴望八公山上草木皆類人形顧謂符融曰此亦勍敵也後淝水𨚫陣大破之北軍皆懼桓沖在荆州遣援余父怡然不變止沖之師沖笑料其必敗及破賊書還無喜色人服其度量而勝負之數已素定於胸中嘻哉余之家世顯忠勤誠無愧於信史焉第七十七誅暴化}
