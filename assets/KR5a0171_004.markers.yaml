  - {type: variant, offset: 9939, length: 0, content: '', CK-KZ-jye: 世}
  - {type: variant, offset: 9940, length: 356, content: 靈始克一飧是致積累物命冥漠無歸氣化生蝗復害田稻以絶民命此蓋物命相償之報而人未知之也予因戒敕里社俾以方隅護度物命外具録郡守爲民之誠深致民食之請具奏于天欲得行下田祖秉畀炎火以去螟螣之患又請肅將天威以彰郡侯皈叩鸞化之誠帝以予奏懇切特賜俞允於是陰雲晝合電雷以風蝗即盡弭一郡有秋農夫胥慶官吏立予專祠以彰神貺咸淳丁卯春旱不雨農業失時萬民咨嗟户口涣散峽之郡丞程生叔光以太守赴京攝行郡事深致其憂於是重立玄功自破己俸一再禱祈峽之神祇皆爲感格以告于予予以開化分野有所不辭又以程生誠交念孚幽顯貫徹爲宣九天之命敕五龍之水曲施雨澤數日而足自是農耕不失而民業始安及至夏秋蟲蝗復作間爲苗害蓋以向者戒敕里社俾護物命後縁以峽民未知神化殺傷之俗循習猶舊餘殃未除而乖氣感召故也而程生於不睹不聞之間悟有感有應之理密奏投誠假托歸叩予遂達其詞㫖示以未悟録其, CK-KZ: ''}
