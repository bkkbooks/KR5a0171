  - {type: variant, offset: 9412, length: 4, content: 駭聞仙樂, CK-KZ: 安南化六丁五未數相仍井絡參墟總弗庭雷杼不靈踰一紀鰲山分化恰周星瀘川復正車書舊巴峽重羞黍稷馨天道惡盈應未泰江南生聚苟安甯余由周迄今炳靈劍嶺邇自三卯雷杼不靈星周一紀月寓千江雖無地可居幸有天可依親奉玉旨暫宅鰲山而六丁五未之數難逭蜀之諸郡俱有變遷是以巴蓬利閬莫不北首余與崇應昭惠}
