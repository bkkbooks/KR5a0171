  - {type: variant, offset: 7348, length: 1, content: 訓, CK-KZ: 第九十眞元化物有濳通信可知幾回利濟惹閒非觀風隴蜀存眞寂掌籍南昌應事機金闕錦囊宏帝道紫陽玉籙振霄暉更生爲顯昌黎事別有精言示福威余自興國之後遊神附鸞宏顯籙法幸遇聖朝仁化神眞降靈故三神所授大洞經籙法三宗復傳於世昔賀達授姚偉而仕至大夫朱道元授朱渙而官至淸近劉若拙授周良輔而高中科甲黃若水授蘇軾而爲兩制文臣劉浩然授虞允文而爲中興宰相是皆範文儒昌道命可不侈其傳乎乃演是籙於寶屏之鸞而降淸河内傳併委劉安勝與其子當程允洽及其兄兼善計府何敦信衛丹李茂等設壇於誠應樓發揚七十三化之本始以待智者而涪之樂温龍門韓申之者乃宿契也其孫坤臣病篤叩余甚力卽授以符藥復遣治病功曹應感更生仍𢌿法籙今涪夔之間靈應昭昭眞元驗焉第九十一誅}
