  - {type: variant, offset: 8222, length: 3, content: 有惻隱, CK-KZ: 得埋葬者甚眾功聞於上時上天開化十九年下世大宋中元甲子紹熙六年正月初一日三淸至尊在玉淸聖境九霄梵炁之上大會九天十極考校功過無上至尊金闕昊天玉皇上帝總領三界羣眞諸天列曜地水眾聖上朝三淸爾時元始天尊登命金闕侍中九天司馬儲福定命眞君開碧玉寶笈流霞丹匣出萬天素威功過玉厯考校諸天諸地水界陽曹昇眞得道以來功過大小以余自龍漢初劫化九光之始育黃之秀神一挺生已三千餘化迄於周武王之乙已𡻕乃符火德降生於淸河氏九十餘世之盡孝盡忠百千萬化之積功累行當次天帝之位於是諸天行舉三界推尊頒降玉厯下示金闕乃命玉宸左侍瑤華内院翰林瓊章學士諸天眞君撰製玉册以是月十五日進封帝號曰無上大羅天開化十九年正月十五日金闕玉宸瑤華内院三天門下都省一炁分形化生四靈天道無形無名始靑肇判挺生聖眞乾坤並德日月並明天上天下莫不孝欽唯昊天金闕太師紏察三界三教禍福事九天都督大使判桂祿嗣籍上仙元皇眞人張某黃孕質炳靈張翼之精梵炁通靈妙證虛皇之果植立古今之名教彌綸天地之璇綱全十華十德之太朗八景八眞之妙善分身應化不外}
