  - {type: variant, offset: 6189, length: 2, content: 熙熙, CK-KZ: 法門居淸涼寶山仍司民疾苦時蜀人苦於湍流自遂城至涪江水溢抵於城隍人多漂蕩又苦疫癘痼瘵音漬癰疽之疾余化里神爲作篙師拯合溺者凡數千人又化太醫生親爲診候全活者眾會鷲峰古佛紀功錄行爲余授記作是言汝於當世作佛號安樂不動地遊戲三昧定慧王菩薩釋迦梵鎭如來今證斯果焉第八十四明良化藝祖開基妙若神義欽遜德不勞兵終南翊聖會全璧汾晉西祠巳結纓十策條陳裨獻納兩朝爕理致昇平明良慶會應非偶炳炳丹靑顯令名余方居不動地精修妙行而八紘音橫雲擾世變輪迴適奉玉音五星聚奎有興宋之語徧勅諸靈出以應運故翊聖降於終南張守眞之廬及晉祠有崇德之聘余遣次子曰懋陽生於淸河曰齊賢布衣十策厯相兩朝佐神獨孤生於㓂氏曰平仲力輔章聖策功澶音蟬淵基二百載太平之治焉事載國史所驗不誣第八十五忠顯化聖明}
