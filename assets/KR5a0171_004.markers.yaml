  - {type: variant, offset: 8723, length: 305, content: 予父玄初大帝尊號宜益加敬焉故畢工書之以示後之士夫云終親第九十四古來喪不過三年暮死朝生宜吉涓祭葬克終營馬鬛哀矜盡孝卜牛眠風雷感激施甘澤稼穡重蘇起大田埋王佳城寢苫畢神龍輔佐產英賢予昔在蜀栖眞於摩維洞天旱蝗三載有四境城隍同日申到蜀民無知停柩經年暴露考妣血尸衝穢上天見怒鎖諸龍潭旱損禾苗民失秋望欲望眞君眷憫蘇救生民予化一居士隨門勸化急作窀穸遂與青源眞君射洪眞君議檄九江龍王克沛甘霖三日已往復蘇多稼民大悦時玉帝大怒九江龍王擅行雨事追斬龍族予又化一秀士普勸龍王龍女及諸生民不斷音聲誦彌羅御詰不計萬數未經三日祥風瑞氣藹于金闕奉命特赦龍王之罪自後孝子順孫既喪考妣不敢停柩克終大事事親終矣陰陽和風雨時福貽後昆芝蘭挺秀壽冨康寧放生, CK-KZ: 也}
