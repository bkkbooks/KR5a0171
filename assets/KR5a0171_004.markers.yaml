  - {type: variant, offset: 9484, length: 109, content: 十六代天師乖於紹聖遂托形宗演果受玄恩蓋以劫運未消教風怯振所幸道德五千文一脉存焉兹又夢符仙種立爲三十七代與棣受命于先朝皇帝親沾灑翰頂受師號中興玄化衛國衛民榮祝帝堯萬壽子禹孫湯股肱惟良保劫度齡民安鴻雁正一科教由是而興焉弭蝗, CK-KZ: 神之力也}
