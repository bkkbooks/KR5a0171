  - {type: variant, offset: 6505, length: 1, content: 我, CK-KZ: 器二聖北狩百姓流離於是相聚雈音完苻蝟毛而起攻城剽邑流血成川炊者不及析骸食者不遑易子億兆空懷主之念九牧大勤王之師猱音牢猾狼貪未已再興西北之師逼於秦梁幾陷王師乞靈於祠然余已應化淸河氏之家久矣余之五子長曰淵石卽竟也次曰懋陽卽贄也三曰竇曰貫曰質統佐神崔瑄李懋等奉上帝命憫其一方勅令助國卽以神兵現滿山川金人驚駭而遁木馬有汗流之珠隴西獲晏安之福以迄於}
