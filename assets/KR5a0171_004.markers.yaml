  - {type: variant, offset: 8232, length: 0, content: '', CK-KZ: 成行滿三千劫之道備德高坤維宏福惠之恩乾造賴贊襄之力善盈玉厯名渙瑤穹當位帝眞式隆寵號謹遣金闕侍中玉宸左侍淸學士無上上德眞君甯洪齎捧金書玉册特上尊號進拜南極長生眞王九天定元保生扶教開化主宰波羅尼密不驕樂育天帝救劫大慈悲更生永命天尊上極先天地道藴黃生一炁以化三才混合空洞證十通}
