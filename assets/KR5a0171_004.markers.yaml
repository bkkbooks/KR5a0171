  - {type: variant, offset: 9597, length: 0, content: '', CK-KZ: 復古化摩圍勝地聳金蓮眞宅甯親顯後天胊音渠水規恢修禮典鵞灘助順洗腥羶大開復古康民化誓作分身救劫仙一十七書堪範世飛鸞演化示眞詮余三潮宅眞之地數罹劫變再奉天勑移鸞於黔遂以雲龍山摩圍之後洞爲甯親之宅以駐神蹕分遣仙官}
