  - {type: variant, offset: 9734, length: 197, content: 禄嗣應人以符藥濟世以吉凶避就之理示人進退存亡之機廣正大公平之心潜消鄙詐漏慢之習福善禍淫惠吉逆凶陰驅潜感之間泛應曲當之際亦有聞風而化者但以月鸞主司杜南强常以吾化體出自然眞常應物不尚表暴以驚世疑俗又以隨寓應酬多失紀載越六七年矣咸淳乙丑峽境妖蝗農民告病紏察具報以郡守陳順武翼赴聚英集眞壇請表箋天願弭蝗灾消殄予遂呼里社詢之乃云郡民多於溪澗或於山澤摝取蚌𧑐漁獵魚鼈甚至斷剥蛙鰲供應主需枉殺螺蟹以給口累百千, CK-KZ: 昌文儒}
