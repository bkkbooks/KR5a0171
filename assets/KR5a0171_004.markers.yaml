  - {type: variant, offset: 8233, length: 3, content: 陞證安, CK-KZ: 成萬行離相消塵扶教定元下制延康之浩劫保生行化俾超暉景之太霞位峻九天職隆三界丕闡慈悲之行大恢生化之原持檀熾音領蒼胡寶功高莫議德盛難踰合示嘉尊幸毋謙遜仍冀同符大道劫劫長存普福生民巍巍其大龍章昭錫永祕都謹言於是余以是日受徽號於玉宸金闕七寶瓊臺之上昊天至尊御殿典儀賜羽葆霓旌九龍玉輦九鳳瓊輿冠通天十二旒之冠服衮日月山龍華蟲之服圭朱履所居之宫一曰紫微垣文昌宮在赤明和陽虛明堂曜天之間一曰玉霄綘宮在波羅密不驕}
