  - {type: variant, offset: 4842, length: 177, content: 北都冨室智全禮中眷修祀一室盡醉暴客王才者約其徒三人謀劫之是夜未央推户直入縳全禮家男女良賤九人婢妾七人唯全禮之妻與二女容繫之既取其貲将亂之全禮之妻惶懼乞憐幼女舜華年十五與其姐舜英抱母而泣才欲逼之華罵曰餓賊犯吾家張神君未知汝也語畢其家司命崔瑄與智之祖禰告急于予予乃遣功曹輔興領陰兵百人治之所縳全禮以下繩皆自解盡執其賊翌日告於里正聞于郡悉誅之梓潼帝君化書卷之三, CK-KZ: ''}
