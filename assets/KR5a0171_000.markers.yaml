  - {type: variant, offset: 809, length: 5, content: 延祐三年春, CK-KZ: 雖然法立而姦生眞去而僞起碔砆或可以亂玉稂莠或至於敗禾假神爲言誣天欺俗者亦有之是則付之於清議又不足與辨也時淳熙重光赤奮若至曰寶屏山序續降化書事跡原序夫陰陽不測天地之化也以道設教聖人之化也合乾道之變而藏其用因聖人之教以寓其跡者其惟神乎以大而言之麗乎天者非止曰月也有星辰焉有璇璣焉而又鼓之以雷霆潤之以風雨此所以不言而行四時麗乎地者豈特草木也有邱陵焉有河海焉而又敘九疇分六氣此所以不言而生萬物至於聖人開物成務法天地不言之化運至誠贊育之妙自微而潛乎心至大而行之天下則神之爲用存乎其}
