  - {type: variant, offset: 1307, length: 348, content: 訂炤以示人彼將曰好事者附會妄誕尚鬼神耳羣疑之中得貞确端懿之士某等爲吾反覆辨校南北二本式質鬼神予命之曰比者南本則厞實多北本經予親校事實詳明斷自丁未化前更定舛訛桂籍化後删改繁亂予又增及甦民化科舉化爲九十有九姑虚其文以存後意俾正校者梓木傳行以示來哲庶無疑妄人之言曰聖人神道設教九經並明日月博雅君子代不乏人典明教化猶不能家喻户書何區區化書之帙能砥柱于中流耶鳴呼其亦不思而已矣化之所存道之所存也居官者覽予化跡若是之嚴忠廉幹濟之心未必不凛凛也文人儒士觀是化之終始知赫赫之若臨未必不祇懼修省農工商賈雜家者流聞千百載之駭聞欺心者獲天誅口業者被神戮善有賞惡有罰未必不寒心竦毛遷善改過習釋道者知劫運果報之昭昭未必不全其心而蹈其矩奚啻頑夫廉懦夫立耳鄙夫之言曰子不語怪力亂神何怪神之多多此非時中之人斯不可語上也斯守白公之, CK-KZ: ''}
