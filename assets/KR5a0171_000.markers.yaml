  - {type: variant, offset: 1725, length: 184, content: 若夫予之神在天下若日月之運于天予奪嗣禄職掌文衡天下小大事端靡不該括吁回風返火既行之于往雷勵風飛不能行之于今耶咨爾天民體予至意立仁義于詩書之圃策忠孝于廉讓之鄉共躋仁壽同樂太平幸也否則恭行天罰及悔何追予忝膺重寄恐負天子寵光故此爲叙吾先奉玉帝敕授以如意飛鸞墨跡于天地之間也救末劫爰命梓潼君也今吾之九十余生之化故命于勿于堅重校勘此文今已周矣請命於吾親跋于後耶九十余生闡化機扶生, CK-KZ: ''}
