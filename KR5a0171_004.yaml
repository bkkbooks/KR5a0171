body:
  text: 殺生第六十一蠢動含靈皆有命貪生畏死與人同因思骨髓脂膏味俾在砧刀鼎鑊中不顧寃魂隨影響只知滋味美喉嚨杜章烹盡前生福業果成時報不空邛有杜章望帝之支也生於冨貴父母好宴樂會集以為常凡烹割之事章躬親之及長身任門户廚饌無虛日膾炙方離口刀機巳在乎矣後以災禍相繼家道零替無以為生為人屠劊以就口食所取人財名過命錢又而性嗜肉味日常不足及以罟取魚以弋彈雀所見飛走皆萌殺心中年生五子皆無指口纍所迫過命之資不足度日悽惶無聊尋有癩疾肌膚破裂膿血流潰見者掩鼻矣自以飢火所燒復受疾苦投井自盡為人執之極口辱罵於是仰天呼寃豫見之訝而問里域主者孫洪叔言其詳且言此人祿盡而命長尚餘五年豫既知其造業之由又復閔其受苦之酷且歲方遙惡其日夕怨怨天帝乃遣功曹易其心志使以手揭瘡皮以自食之又以指點膿血吮咀求味宣言於人曰母作殺生業以我為戒如此逾年以凖未盡之數念斷而死諸子皆殍焉酷虐第六十二公孫武仲處心廉鞭撻諸胥失大嚴資水賴恩還縱吏酷民誅取却無猒化身戒勵誠惟一攺行寬平利可兼裁抑有餘增不足吏民兩邑惠俱霑牛鞞邑令公孫武仲治已以廉而待人不恕左右之人小有過失笞一二百蒞邑逾年而胥吏無全膚吏怨之資水邑令賴恩性貪沓以苞苴爲常日用飲食歲時衣裝取給於胥吏而民事造庭者無問曲直悉付之狴犴恣吏誅求意足乃巳吏決未猒則遷延歲月置而不問民怨之豫以二邑之吏民被苦乃化身為蜀郡丞長孫義行諸邑觀風俗劾仲之虐吏賴恩之酷民二令叩頭乞免豫戒勵之尋隱而不現後知郡丞初無行邑之事二邑咸以為神而敬信之武仲改而忠恕恩亦變亦變而廉潔焉憫世第六十三周室隳頽為不仁蒼姬一旦變嬴秦慘刑暴吏無和氣詐計窮兵又幾春不忍中原罹此禍願開方寸濟斯民上天有㫖垂俞允雨後乾坤又一新豫嘗仕於周以忠盡命血食於蜀未幾蜀入於秦已而周喪天下皆嬴氏矣秦任刑法視民如草芥秦衰而干戈又起中原塗炭于斯久矣豫以久處靜境思以拯斯民之苦乃飛章上聞于帝從之若曰白帝子遊人間久矣而暴於殺伐今已遣赤帝子代之矣汝以本司火德今當應世以為赤帝子之後豫受命焉咸陽第六十四護持全蜀幸優游應世情牽强出頭被譖不成膺繼統殺身空與結寃讎封王緣薄終何益報母心酸未肯休那得身為率然相盡吞諸吕快幽憂豫之懇于上天將以化身援天下於塗炭之中躋斯民於和樂之地無何帝命以豫為赤帝子之後玉音可畏豫不敢抗靜而思之非所望也俄有九天監生大神逼豫受生於雲霄間下視咸陽火秦之後宫闕鼎新漢帝方與戚姬昭語監生逼豫曰此所謂赤帝子者也今為漢帝矣豫縱目間為監生大神所擠墮於帝側戚姬之懷恍然而覺帝以豫生骨相相肖舉止可喜名豫曰如意豫雖提孩中而本志尚堅語言顧盻尤愜帝意帝尤鍾愛每以豫兄為不類薄之晚年欲以豫為太子既不果帝萬歲後卒為吕氏所殺豫母之死尤被酷毒豫深怨之方冥冥間見母受苦時思得復為率然之相盡吞諸吕而後已也卭池第六十五恃勢凌人不可為無辜母子被誅夷銜寃入地至極矣不共戴天良是之諸吕後身同一邑雙親乞命在斯時海波平陷四十里還我當年受百罹豫自罹吕禍之後神遊冥漠又無職守嘗蓄宿憤思欲報之已往修積不復問焉雖諸吕死拘幽冥造業深重歷年甚多逮再生亦久遂訪西海之濱有邑名卭池邑令吕牟吕后之後身也邑人多吕氏蓋宿業相尋諸吕造業之黨也萃於窮荒豫母夫人亦生於彼復為戚氏以前身享福太過生此而貧悴所嫁張子年老無嗣夫婦以芟刈為業一日野外相顧而語曰生身窘甚辛苦自養暮年力衰將不免於溝壑今六十而無子是天將殺之耶乃相與割臂出血瀝於石凹中以石覆之拜天而祝曰人皆有子惟我獨無今氣血薄少不能施化願此石下倘使動物生焉亦遺體也豫識母氏心惓惓焉一念感之從而寓止明日二老復來揭石視之血化為蛇金色寸長豫所為也母收養之逾年頂上出角腹下生足能自變化每天欲雨豫為助之身既長大腹量寬邁見羊豕犬馬輒食之邑令有馬色潔而駿牧於水際蹄傷吾末因拘而啖之馬蓋吕産之報身也邑人皆知豫詳訪於豫家而不獲逮豫父母於囹圄責以三日求豫無狀將見殺焉次日豫化儒士謁令解之令曰張老夫婦家飬妖蛇食人六畜久矣今又食吾馬吾將殺之為民去害張不見聽是彼自為妖也今必戮之豫曰物命相償宿業所致遇彼吞噬亦非偶然今君為畜而殺人豈令尹之事乎令叱豫使退豫復語之曰君有死氣浮於面顔宜善自愛他日無悔語畢豫隱形不見令之左右皆以豫為妖豫乃奏天稱寃陳以前世子母無辜死於諸吕今適逢之願與之較辭上而未報因變化風雷呼吸雲霧白晝而暝一邑之人相視而語曰汝頭那得為魚至以手相捫頭面而泣一夕揚海水以為雨灌注城邑圍四十里皆陷豫以身載父母而出焉時孝宣之世今所謂陷河者是也解脫第六十六嗔恚之心莫易生此心生處是無明只知直理堪平訴不待琅音輒徑行謫受大身遭熱惱填還寃債慰羣情世尊一語消餘業却得當來面目成豫前以吕氏寃對奏帝未報而擅行之雖一時快意宿憒頓消及心定意平良用深悔翌日玉音荐降以海神朝閎劾豫擅用海水陷溺平民五百餘户以口計之二千餘命除里域所具豫前身仇對八十餘人半在城隍半居附郭外其餘生齒皆係夭枉帝命賜譴以豫為卭池龍而奪其神職且使天吏監臨不得豫預雨澤羈囚於積水之下連年旱虐水復為泥身既廣大無穴可容烈日上臨內外熱惱八萬四千諸鱗甲中各生小蟲咂囓不已宛轉困苦不記春秋一日晨凉天光忽開五色雲氣浮空而過中有瑞相紺髮螺旋金容月瑩現諸勝妙希有光明山靈河伯萬衆稽首讚歎歡喜聲動天地復有天香繚繞四合天花紛委隨處生春豫乃耳目聰明鼻觀通徹心清口潤聲音發揚仰首哀號乞垂救度萬靈諸聖誡衛先後咸謂豫曰此西方大聖正覺世尊釋迦文佛也今以教法流行東土隨教化身將往中國爾既遭逢宿業可脫豫遂起改悔心生悲愍念身自踴躍入天光中具陳往昔報應之理世尊答言善哉帝子汝於向來孝家忠國作大饒益又復憫世生護持心因果未周仇敵相爭以人我想肆興殘忍遷怒于物業債當償今復自悔欲求解脫汝於此時復有前生寃親之想與夫嗔恚愚癡念否豫聞至理心地開明內外罄然如虛空住無人無我諸念頓息自顧其身隨念消滅復為男子聽佛宣說得灌頂智得大辨才得神通力得圓滿相龍天八部皆大欣悅豫皈依焉仁政第六十七嗔業焚和障最深堅持忍鎧莫容侵瘡傷爾體猶吾體痛切他心似我心吏既不欺終幹蠱民知相愛自甘臨清河薄譽緣斯得歌詠惟將和舜琴豫既離惡趣即得善生受形於趙國為張禹之子名勳既長為中正所推為清河令寬明自任人不忍欺待吏如僚友視民如家人吏有失謬者是正之㢮慢者勉勵之鹵莽者教誨之貪叨者廉察之詭詐者詰難之不用詰詔者免去之惟曲法𢦤民以白為黑事干人命者使自理之辭窮心盡然後付之於法其初情可憫者猶宥之佚出之罰豫所自當不敢辭也民有爭財賄者以義平之爭禮法者以情喻之為賊者使償其貨傷人者使庭拜其敵姦及殺人者付之於法其本心可恕者猶出之容惡之謗亦不敢辭焉以是一方之內雨暘以時蝗蟊不作偷賊相戒而出境姦邪革心而改行為政五年怨懟不聞四民為之歌曰吾有師師嚴而不慈教我恕我張君能之吾有友友信而不戒親我正我張君是賴我有親母恩掩於義張君似之柔而不制我有親兄責敬於情張君似之和而不爭後為太守責以趨進豫解組焉時章帝元和之末也幽明第六十八盡心於道道斯存篤志求仁仁自成性定乃能通晝夜神全方可治幽明林宗愛子存公議帝㫖傳言無隱情三紀辛勤效功績不妨陰騭相羣生豫以先世善政有成福業滋茂天年甫盡即遂有形於順帝永和間載生斯世所謂張孝仲者猶不忘於故稱也復為郭有道所品題雖不登顯仕浮沉里閭而上帝有㫖俾豫日應世務夜治幽明凡人之屈抑寃枉陰德隱謀豫皆知而籍之以至鬼靈邪崇無不預焉如此三紀幽明兼濟人鬼交利豫有功焉籌帷第六十九襟懷有武且兼文一寸心田萬象分寶運將開司馬氏兵謀聊贊鄧將軍出奇問道行吾計盡瘁沙場佑帝勳史氏簡書還闕逸何妨籌畫事無聞豫以善功世修漸復神職而命債未償者猶不吾置復生於河朔少負氣節眼見世變嘗以功名自期乃為大將軍鄧艾見知辟請為從事凡所舉謀豫必預焉及伐蜀之年豫為行軍司馬勸艾以間道出奇以省鋒鏑之禍入蜀深境遇諸葛瞻許以封王琅邪瞻不之聽至於交綏瞻之中堅豫所當也或有流矢星飛集於豫體瞻方就擒豫欲營救之而創甚矣蓋向者卭池未償之報者也可不戒哉如意第七十帝手何年自執持玉京一旦賜於台指揮行陳陰兵出顧揖仇讎惡意移利器尋常為伴者舊名時復自呼之從兹所向皆如意三界神靈孰敢欺豫既滿前緣詔詣玉京洗除惡籍鼎新神位俾豫永福坤維帝又以所執之杖賜豫帝㫖若曰資爾孝仲萬靈之雄忠孝全節世資爾功賚汝斯杖無所不通又曰此如意也豫以杖契宿名欣然受之丁未第七十一越裳五畔金山邑越巂南邊近海涯醉眼醒看新日月間心忙愛舊煙霞元辰司命專丁未趙國中興顯故家火德佐王千萬祀始從今日拜其嘉豫以寶杖自隨無適不可因念前身西海之隅復經從焉越裳之西越巂之南兩越之間有金馬山勝境清絶張老夫婦豫纍生之父母也於是生焉時晋武帝太康八年歲值丁未二月三日夜子刻以甲子考之則其時已屬辛亥矣帝命以豫為丁未陽官本命元辰焉水漕第七十二夢裏為龍為帝王多生習氣未能忘笑他酒饌修淫祀書我官銜牒水鄉風雨聲中奔衛子桑麻陰下舞商羊職司全蜀幽明事七曲遷居道路長豫以成長妻男具而孝敬不衰見鄉人以旱祈雨於土木豫笑之蓋豫嘗夢有報矣一日水際自書官銜移文海神乃見使者告豫以有形以來自周為人迄此顯化七十三矣乃呼豫為運判促上白驢風雨聲中頓失鄉地入大穴中宫庭明敞父母以下血屬皆在一夕雨澤大作遍全蜀之境蓋有㫖以豫總護全蜀幽明之事焉桂籍第七十三儒家桂籍隸天曹得失榮枯數莫逃夢契真誠題義顯榜隨陰德姓名高封妻廕子由寒裔曳紫腰金自白袍為報難窗無寐客勉心文行莫辭勞帝以豫纍世為儒刻意墳典命豫掌天曹桂籍凡士之鄉舉里選大比制科服色祿秩封贈奏豫乃至二府進退皆隸焉孝廉第七十四經術談王辨異同孝廉特地起遺風江寧神璽皆天命日麗重光顯帝功馬化已知興晋室蛙尊誰謂屬劉聰跨驢直入西涼地游戲隨機現六通豫慕釋氏韜光禪寂建興中憫戎狄窺伺朝綱非命世英雄弗能反正會元帝建策南渡綏撫江左而白麟玉璽見於江寧臨安日有重輪皆中興之象豫改日作儒士跨一白驢往河西應孝廉謁張軌焉感時第七十五擬陪鄉士獻能書喜遇姚萇古亦無欲激頽波專號令敢攄忠節委均輸不堪狙詐為三俊笑倚鴻圖應一呼興盡先期歸蜀地軺車枉駕訪吾盧豫建興末作儒士謝艾跨驢入西涼張軌以豫為主簿張重華嗣位時石季龍使將麻秋侵寇不已凉州震動府司馬張耽言於重華曰議者舉將皆推夙舊且韓信穰苴皆非舊將盡明公之舉惟材可任主簿謝艾兼資文武委以專征伐之事庶幾可也重華召艾問以計策艾曰耿弇不以賊遺君父黃權願以萬人當寇乞假臣數千人為殿下吞之重華大悅以步騎三萬人令艾討之麻秋率大衆以禦之艾乘軺車冠白帢鳴鼓而行秋望而怒曰艾年少書生冠服如此輕我也命黑矟龍驤三千馳擊左右大擾勸艾去艾不從下車踞胡床指揮處分賊以伏兵發也懼不敢進秋軍乃退艾乘而擊之俘斬甚衆秋乃匹馬夜遁季龍聞而嘆曰吾以偏師定九州今以九州之力困於重華真所謂波有人焉繼而往關中與姚萇為友欲激頽波以正風化奈何縱暴之君競起廢弒然萇雖少而多謀略又況宿有契好故作密友久之豫猒處凡世思歸蜀峰約萇曰苟冨貴無相忘後萇以蘢驤將軍使蜀至鳳山訪豫豫禮待之假以鐵如意囑之曰麾之可致兵萇疑豫豫為之一麾旗幟蔽天戈盾戎馬萬餘列之平坡今試兵坡是也後萇以苻堅死即帝位號秦焉誅暴第七十六禍福之機本在人只爭現報與前因貪汙賄利欺君命剝刻脂膏虐下民榷貨王仔生犢尾刷錢馬諤化猪身從兹警悟堪為戒一念才虧即有神豫仕晋之後兼治幽顯時蜀之導江王仔者永和中任帥幕吏被檄督榷課盬於潼川而王躬詣井所召民强與約率令倍差認課當取五千斤者倍取萬斤又約來年所輸不滿額者籍其家王仔知其不能如約窺欲沒入之使官自煎既復命帥以鹽數倍增喜之豫聞其苦民故陰治之是夕帥馮遷夢王仔來謁而公裳下有一尾方驚寤有婢亦魘及蘇言適王使者來公裳下有一牛尾出再四言其榷利貪汙之故令生蜀之屬邑田家廷翌日遣人訪之果如所夢又益昌馬諤者同為帥屬每出部邑督錢惟以多為貴不問額重虛實盈縮必得為期且以此自負蜀人苦其虐號曰馬刷或以王君牛尾警之者馬曰正使見世尾生亦何必問豫聞其暴虐如此聞之上帝繼而病卒七日之中其家作薦復聞棺中有聲意其再生亟開棺視之則已變為一猪矣急掩而葬之時天氣晴爽喪車方起犬雨如注送者皆不可行及墓次水已溢矣此可為汙吏之戒明經第七十七銅川蓍筮久潜心道學儒宗己陸沉天假仲淹重振鐸文追孔氏復鏗金儒風欲繫唐虞化大雅全排鄭衛音董氏庶幾顔氏子升堂窺見室之深豫久處穹昊帝以中國道衰欲王化之復行故命豫生銅川家知隋運將終吾道未濟退居河汾間修先王之業制禮以節情作樂以和俗恢刑政以防其非崇祭祀以介其福祖述周孔取則軻雄九年而成經也其於五常之教於小子何述焉復以禮樂之學付之董常惜其不一用於太宗之朝悲夫護聖第七十八漁陽鼙鼓叩長安此日明皇幸劍關若聽九齡攄諫論豈勞七曲重躋攀不因儒士為親謁安得鑾輿返遠還萬里橋邊迎禁蹕誰知虛位紫霄間豫自汾陽傳道猒於死生再奉帝命輔唐室故命長子淵石生於清河氏之家即九齡明皇時李林甫之譖毁肅氏而帝賴之以不易至於議論風生首登七寶山坐有文場戰師之雄應制走丸之辨後漁陽之亂明皇幸蜀鑿劍嶺而觀中原歎曰吾聽九齡不至於此也豫因至萬里橋以儒士謁帝帝曰卿非北郭張生乎豫曰然臣聞元載孔升天虛位久之以待陛下也帝默然後肅宗收復京都韋見素迎帝歸闕封豫為右丞相而豫密衛鑾輿至咸陽帝移大內安頤遂辟穀張皇后進櫻桃蔗漿等悉不食常玩一紫玉笛自吹數聲有雙鶴下徘徊於庭帝謂宫愛曰吾奉上帝命居元載孔升天令具湯沐復就寢而升化明威第七十九影響昭昭理可尋往天豈與物交侵眼根所著無非色身業居多莫匪淫四舉不沾天子祿一生虛負狀元心李登狂妄終除籍感報徒嗟罪障深唐李登者年十八鄉貢首自後凡十年一薦名愈下年幾五十不第一日齊戒詣葉靜法師且告曰登自十八歲叨冒鄉薦凡經四舉不登一第何罪至此幸法師入冥為某勘當此生如何法師語之曰蜀之梓潼有神曰北郭生掌文昌主貢舉司祿之官必能知之吾當為汝叩之一日上章道過治所謁豫法師曰士人李登者某年月日時凡四舉不第此人果何如豫命一吏示籍對曰李登初生時賜玉印十八歲魁薦十九作狀元五十三位至左相緣得舉後窺鄰女張燕娘事雖不諧而繫其父張澄於獄以此罪展十年降第二甲二十八歲後侵兄李豐宅基而奪之致刑于訟以此又展十年降第三甲三十八歲得舉後長安邸中淫一良人婦鄭氏而成其夫白元之罪又展十年降第四甲四十八歲得舉後盜鄰居王驥家室女慶娘為惡不悛已削去其籍矣終身不第法師辭退以是語登登無以對一夕愧恨而死後之士夫可不戒哉濟順第八十綿綿唐祚欲傾摧叛逆陵遲陷北臺逼脅乘輿臨草莽爭驅甲胄走塵埃天恩昭顯精神會帝道重宣雨露來桔柏津前新應詔虬鋩誰信作良媒唐乾符中歲荒河南為盜者甚衆尚君長伏誅尚讓等推黃巢為主反長驅江陵渡江為患入河北攻河南數十郡次陷洛陽破潼關僖宗播遷入蜀巢犯闕巢遣朱溫等攻鳳翔至潼關追僖宗乘輿夜遁出鳳翔豫以儒服見帝帝夜行馬駃豫以所乘騎奉帝帝乘之豫捧足攏馬密布綵雲衛帝騰空彌明露雲微綻令帝下視見鳳翔軍與巢軍戰于龍虎阪若蟻陳也帝曰此何所豫曰此乃空際帝驚歎曰卿非北郭生張孝友乎我非卿豈料生耶豫奉帝至劍南復道帝疲甚欲少憩命豫股以枕之熟眠林葉風聲帝忽躍起曰巢兵至矣鼙鉦近也豫曰非也乃林葉風聲久之從駕宿衛始及訝帝行之速也帝至桔柏津曰我有一女乃興唐公主最神慧奉卿箕帚可乎豫曰臣幽也何敢奉承帝曰勿固辭遂封吾順濟王親至廟奠獻解劍為賜仗豫剿賊後宋文通等斬巢送首成都帝還闕則興唐公主從而殂矣豫命兵迎公主歸七曲焉濟迷第八十一救世乖訛物理衰神人淆混化塵微庸愚指我為妖妄蒙昧嗟豫擬是非匝地亂雲多雨潦亘天烈火示光輝孫譙始信英靈著從此寰中顯福威五季中進士孫譙者性尚剛介不與羣居詆斥佛老著無鬼論自隴之蜀過祠下侮辱無禮而去抵於山陰天忽昏晦風雨如撒行者不可進欲投邸而不可得遂呼曰此乃北郭生張君如果有靈則指涯涘如何豫令佐神舉火一二示之譙尚笑曰廟奴誑我再呼曰神既在何不為我止風雨使我能抵于平陸如何豫笑曰子所過神祠必狎侮指以為妖笑以為誣今悔之何及也豫示之以炬火數百山川明朗可容行李須臾風雨頓止翌日留記于廟焉忠顯第八十二熙熙天祚福皇朝叛寇生羌亂蜀妖均唱勃徒凌郡縣順連賊伍結芻蕘卒呼勇義陰兵力箭貫膚腸意氣豪木馬汗流如密報天恩依覆下參郊皇朝均順之亂主帥雷守忠祝吾助神兵遂入蜀至利州為賊堅壁固壘不下其禆將王吉大呼語賊曰吾奉天命剿賊必矣可降而賊以徑弩射之貫腹其人歡呼自若封之以藥而無恙帥亦如之朝廷封豫英顯王而功奏上天即證定慧王果焉聖治第八十三太平風化樂唐虞致治馨香等太初率服四夷明德教奠安百姓法規模挈衷頓領知賢相錯節盤根見大儒子含輔成元祐政著書猶用鑑寰區皇朝一祖四宗垂拱太平豫奉玉音以次子文明生于司馬氏家名光盡誠於館著古今歷代史以鑑於世輔宣仁聖烈皇后擁少主不出簾帷而天下治當時庶政聿修咸謂德合天地道通神明因積仁纍德凛凛乎庶幾周召之烈焉摽忠第八十四藝祖開基妙若神我今遜德不勞兵終南翊聖曾全壁汾晋西祠已結纓寇氏澶淵平虜力真皇東作福基成此回又是忘形久笑指朱崖道一征豫以世態之變居寂久之而符生於皇國開基之初即寇準也後澶淵之役立仁考之功豫與焉至於以豫為誣議豫涉海至崖悲夫興國第八十五朝廷中否甚傷情事業班班可訪尋政在平江扶大寶兵虧陜右本天心便宜坐使兩蜀靜升陟恩流三峽深要識此回神異處柩中全體土無侵豫紹聖丁丑託化張浚立一世之英表平江復辟至聖天子垂統四十餘載至冨平之敗非浚之失乃天也隆興甲申浚死葬于衡陽其子杓欲更葬于蜀既啓棺視之威容儼然如存合郡士夫觀者如堵以手加額者衆因從而掩之倘非豫神化安有此也豫生領天子之權于蜀掌職文昌之命于天其功績不忝矣止足第八十六玉策褒稱賜寵光尊隆師傳總元綱積功唯喜修天壽被命寧辭抗帝章蒞事惟勤居太極貢賢是任主文昌錫民五福期康乂非特區區一雨暘豫隆興之歲奉玉音加秩若曰文昌者教化之本原實傳列聖之業儒士者道德之淵藪宜攄一德之忠播告諸天亶孚有衆惟文昌司祿主者職貢舉真君衛民少傅靈應帝君張某德被萬物威形四方粵自有生顯從浩劫順考古道鑒觀人文照臨並日月之明發生佐乾坤之化是以教耕稼而民人育每裁制而自優修禮樂而政事康果猷為之不謬干戈載戢陰陽常和水土既平休祥時格託之庶務試以諸難皆濟濟以可觀每多多而益辦昔自水漕令蒞台衡尚持救苦之心誓拯倒懸之念厥有成績巍乎難名察乎九十餘化之行藏命編羣册著以萬二千端之行節豈曰空文顛則持而危則扶惡以懲而善以勸生民允賴惟乃之休況復恢龍漢之圖書闡鸞臺之典則欲分身而顯化率諸聖以混融萬梵開張三界均利宜加峻位俯叶輿情名躋南極之尊禮絶星聯之上於戲躋三階而下太乙久彰應物之符斂五福而錫庶民式賴師言之左誰其能者汝往欽哉可特加金闕昊天太師紏察三界禍福事豫辭表略曰滿盈之懼上瀆瑩聰溫厚之辭時紆訓詰意敢懷於不敏欲猶冀於必從中謝伏念臣德薄位尊言輕行寡徒以效誠之决未懷引退之私兹遇盛時重明異數豈不侈高上之賜其亦畏至窮之災恭惟天尊上帝道善貸以且成明容光而必照護以小疵之失察其由中之言方將曲致於施仁夫亦何嫌於遷令再三辭遜而受之兼司四方禍福所以分身應化焉訓逆第八十七密承帝㫖下蒼旻昭示塵寰禍福均燮理權衡明察訪斡旋綱紀運經綸外臺執法專生柄蜀部觀風秉化鈞雷震中江王氏子斫棺只為逆亡親豫被命遷師相之職專生殺之柄採訪善惡悉便宜也乾道中蜀之中江王千者初其父母自買香木棺以備身後王易以杉木已而又貨之易以株板及亡母則又留株板欲自用但市松棺斂母而葬豫於旬日將王以雷擊死倒植其尸或走報其子急往哭而扶尸仆地日正中忽雷震挈其子於五里外洎復回見父尸依前倒植凡兩瘞皆震出遂棺上斫一竅以竹而掩之姑免震焉戒欺第八十八為人貪暴莫如廉祿算乘除理灼然楊震四知名莫掩子文三已節尤堅存心勿謂陰無報失職那堪又减年試把徐謙形夢感黃金特地障前緣乾道中新都丞徐謙者被檄充勘官將道經宿徐氏家主人前一夕夢神人謂曰明日有徐侍郎宿汝家宜善遇之神人乃吾所遣佐神也至晚果有徐從政踵門遂具盛禮及回復夢曰徐子此回受人五百金枉七人命天曹已减三十年壽官止此矣徐氏遂不復相接丞公深訝之抵暮遣蒼頭語以夢中之事丞公愧形于色回任及替舉主改秩未及命而卒于邸中年三十四初傳其死鄉人未之信既聞其事莫不惜其用心之欺焉誅悖第八十九子職須知奉二親養生送死禮宜遵遺骸暴露如羈旅逝魄浮游未掩真餘子徒勞從孝行春秋責備在賢人羅生感夢還鄉舍方悟陰愆速此身梓潼縣羅鞏者入于上庠過豫祠默禱於豫一夕豫夢告之曰子已獲罪天曹宜急還鄉前程勿須問也鞏懇曰鞏平生操守鮮有過失願聞罪由豫曰子無他惟父母久不葬耳鞏曰家有兄弟何獨歸罪於某豫曰以子習禮義為儒者故任其咎餘子碌碌不足責也鞏既悟悔恨治裝回鄉同舍驚問鞏以夢告則未及家而卒焉真元第九十物有潜通信可知幾回利濟惹間非觀風隴蜀存真寂掌籍南昌應化機曲意為民除冢訟忘形救物拯萎微從兹願化昌黎後别有精玄示福威紹興庚戌豫遊神察訪附鸞抵涪之樂溫會龍門韓申之叩豫符訣救其孫坤臣之危疾豫令治病功曹應感更生以申之宿契所遇豫遂付以符籙拔苦第九十一苦海淹淹浪接天生來死去各前緣爭看妄想空花裏不覺枯骸腐草邊孔聖殤童因立教周文葬骨豈知年皇穹委任司民苦惻隱之心亦空焉豫以上帝篤好生之德而天下多遺骸暴露者付豫誘收也且古史曰枯骸不知年數尚感文王之葬童子結伍以衛魯國猶存孔子之殤然今人不念葬其父母況於他人而有惻隱乎豫以救苦之功而升證安樂不動地游戲三昧如來果焉福瀘第九十二煙橫瀘水碧漣漪殺業誰知會遇時山寺劊身徒憤憤嶽靈未報且遲遲倘存忠厚佛三昧不到仇連李萬兒張信復歸王吉手彼寃此報罔踰期紹興中瀘帥張孝芳者為卒伍張信等所謀而致叛信為同伍張昌殺之瀘遂平定此乃紹聖中秭歸鄉一僧俗姓廖名慧覺居山院蓄資甚厚集衆作斷瘟水陸繼而茶寇李萬兒者率衆欲劫之初不知其僧設穽於四垣遂盡陷之惟李萬兒數人僧與其徒劊而食之後李萬兒圖報其寃嶽靈曰汝報之未可此人有為衆作福之緣未艾更一生可也惟汝尚有所殺王吉必報汝也自是僧慧覺生清河家即芳也萬兒乃張信也吉即張昌也其報昭然豫遂與英烈統理神衛瀘而平焉昭明第九十三自從太極肇羲皇神性隨機雲水鄉九十四回彰變化三千餘行露微芒雙峰為建立初宅七曲重遊參宿方聊附飛鸞明此意出書示訓藉揄揚豫以真元拔苦後天命荐隆位登金闕逍遙紫虛遊神訪察寓鸞顯化示以道德仁義之教變其偷薄鄙詐之風忽功曹奏涪陵郡之樂昌運騰里人楊思作文昌星席豫拉崇應為降福民朱章感諸真共集因覽山川之秀有雙峰者真神仙窟宅氣宇豫遂為有君玄初大帝化建寓室而韓震巽亦樂施田焉豫遂請于帝立昭明應化鸞臺以示四民休徵今祠已落成之久為樂昌之美觀蓋於吾香火莫非夙昔契旦世人亦知豫父玄初大帝尊號宜益加敬焉故畢工書之以示後之士夫云終親第九十四古來喪不過三年暮死朝生宜吉涓祭葬克終營馬鬛哀矜盡孝卜牛眠風雷感激施甘澤稼穡重蘇起大田埋王佳城寢苫畢神龍輔佐産英賢豫昔在蜀栖真於摩維洞天旱蝗三載有四境城隍同日申到蜀民無知停柩經年暴露考妣血尸衝穢上天見怒鎖諸龍潭旱損禾苗民失秋望欲望真君眷憫蘇救生民豫化一居士隨門勸化急作窀穸遂與青源真君射洪真君議檄九江龍王克沛甘霖三日已往復蘇多稼民大悅時玉帝大怒九江龍王擅行雨事追斬龍族豫又化一秀士普勸龍王龍女及諸生民不斷音聲誦彌羅御詰不計萬數未經三日祥風瑞氣藹于金闕奉命特赦龍王之罪自後孝子順孫既喪考妣不敢停柩克終大事事親終矣陰陽和風雨時福貽後昆芝蘭挺秀壽冨康寧放生第九十五濕化卵胎都是人只緣貪戾著真情螟螟抱母懷春育蠢蠢凌波逐浪生陽序放魚延紀壽冲元活鱔慶前程遞相勉諭放生命福蔭循環世代榮豫念一切衆生皆有佛性凡食牛肉者上天有太牢星地下有太牢山專治食牛之人受苦萬劫殺牛之人萬劫無赦多遭疫癘而死至若猪羊犬豕羽毛鱗介濕化卵胎皆受父母生成因差一念見出萬形仲春禁覆巢此月令之戒也弋不射宿孔子之戒也凡好道修真之士肥甘不足於口三寸舌根而已何如不自殺不教他殺不見聞殺隨喜殺享此五般淨肉可以無大過矣何必貪諸口腹昔李冲元好食鱔豫知其情感夢化一皂嫗告冲元曰我腹中有五千子我死子亦死矣儻能更生獲福無量冲元信而捨其鱔後不復再殺又陽序一巨商耳豫知其詳化夢形之曰子明年當死若救得十萬生命可延一紀之壽序曰大限既至何可活十萬生命豫曰可放魚子則有報驗序覺之大書市肆遞相勉諭及不惜己財贖魚卵投放水中月餘豫再形夢曰子救十萬生靈已足矣可延壽一紀後子孫世代榮昌信不誣矣中興第九十六駭聞仙樂奏宫啇大道中興踵後芳道德五千消劫運乾坤億載福金湯黍官景運重宣化蘂笈靈文再闡揚正一玄科振寰海永延皇祚壽無疆豫遊宴玉京怡真靜默每念龍虎嗣漢三十六代天師乖於紹聖遂托形宗演果受玄恩蓋以劫運未消教風怯振所幸道德五千文一脉存焉兹又夢符仙種立為三十七代與棣受命于先朝皇帝親沾灑翰頂受師號中興玄化衛國衛民榮祝帝堯萬壽子禹孫湯股肱惟良保劫度齡民安鴻雁正一科教由是而興焉弭蝗第九十七隨方分化楚城邉興利除殘本自然螟螣害苗農告病鸞機應念表箋天肅將雷電彰誠意無復蟲蝗滿大田神化昭昭難自泯因人感事續餘篇豫自君山主宰兼洞庭水治以至蜀門旺化神遊附鸞于世有日矣開慶已來豫嘗以荆楚間禱祭魔法枉所傷害諂求餘福鬼毒流盛而真道未行有意化之遂面奏天庭分命月鸞開化月峽豫乃隨機應化以祿嗣應人以符藥濟世以吉凶避就之理示人進退存亡之機廣正大公平之心潜消鄙詐漏慢之習福善禍淫惠吉逆凶陰驅潜感之間泛應曲當之際亦有聞風而化者但以月鸞主司杜南强常以吾化體出自然真常應物不尚表暴以驚世疑俗又以隨寓應酬多失紀載越六七年矣咸淳乙丑峽境妖蝗農民告病紏察具報以郡守陳順武翼赴聚英集真壇請表箋天願弭蝗灾消殄豫遂呼里社詢之乃云郡民多於溪澗或於山澤摝取蚌𧑐漁獵魚鱉甚至斷剝蛙鰲供應主需枉殺螺蟹以給口纍百千之命不供一飽億萬之靈始克一飧是致積纍物命冥漠無歸氣化生蝗復害田稻以絶民命此蓋物命相償之報而人未知之也豫因戒敕里社俾以方隅護度物命外具録郡守為民之誠深致民食之請具奏于天欲得行下田祖秉畀炎火以去螟螣之患又請肅將天威以彰郡侯皈叩鸞化之誠帝以豫奏懇切特賜俞允於是陰雲晝合電雷以風蝗即盡弭一郡有秋農夫胥慶官吏立豫專祠以彰神貺咸淳丁卯春旱不雨農業失時萬民咨嗟户口涣散峽之郡丞程生叔光以太守赴京攝行郡事深致其憂於是重立玄功自破己俸一再禱祈峽之神祇皆為感格以告于豫豫以開化分野有所不辭又以程生誠交念孚幽顯貫徹為宣九天之命敕五龍之水曲施雨澤數日而足自是農耕不失而民業始安及至夏秋蟲蝗復作間為苗害蓋以向者戒敕里社俾護物命後緣以峽民未知神化殺傷之俗循習猶舊餘殃未除而乖氣感召故也而程生於不睹不聞之間悟有感有應之理密奏投誠假托歸叩豫遂達其詞㫖示以未悟録其真懇飛章奏聞夜雨天一之水雨洗冥漠之靈晝赫秋陽之威一去蟊賊之害於是因人感事呼鸞載筆書弭蝗之化警殺生之人附于化籍播本宣傳于以彰郡丞至誠贊化之功于以挽回氣化以成歲熟之效庶聞之者足以戒焉是歲秋七月既望再書于侍生安節野人杜南强所事之鸞壇梓潼帝君化書卷之四
