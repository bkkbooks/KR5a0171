body:
  text: 感生第二十一神識君山歲月遥洞天深邃絶塵囂偶嗟涕泣無從出已覺悲魂不可招奪舍投胎縁未足拖泥帶水恨難消玉壺不肯藏春住漏泄陽和見柳條予在君山久矣一日春水初生湖口有大舟艤岸刲羊釃酒呼號而祭者甚罄哀婉清切予聞之不覺情感迫而聽之一婦年三十餘體有金光三酹而祝曰良人不幸得罪於君遠竄南荒死於瘴癘家鄉萬里旅櫬言歸日月不居行將卒哭重念家無兼侍堂有二親有子在腹未形兆眹若山川神靈察我夫君以忠獲罪憐我姑嫜暮景無依今臨蓐有期爲垂陰祐使得一男子以續張氏則妾之性命雖不保猶無憾焉予在雲路中不勝其悲涕泗從出忽身墮婦懷懵然無覺久之聞人語曰是兒是兒予開目視之身在浴盆中蓋已生矣奉先第二十二厲王監謗衆心離先子忠言履禍機流彘早知將易位逆鱗悔不聽防微録孤聖澤曾無間美謚英魂更有輝徑陟諫垣承世職人言有子可傳衣皇考諱無忌歸葬河朔母黄氏慈祥明辯篤于教訓凡乳哺偃息寤歌之次必以詩書言語誘習鄰兒與予嬉戲則以泥土繒帛結束設像以爲古人稱揚故事或爲君臣朝會或爲父予告戒或爲師徒訓勵或爲朋友接陪每事指陳俾予曉習世故十歲使就外學名予曰忠嗣追先志也既長而冠王父平子宇予曰仲母氏嚴三加之禮西序答拜因泣謂予曰爾父曩事厲王爲保氏掌諫王惡而王性多忌恥聞其過諫者必誅久之至於監謗罪死者衆道路相語以目人不堪命百姓離怨乃以疏告王願王改行除誹謗之令以通下情王不聽於是流於番禺既而不禄天下寃之今王仁政詔先朝臣子死以非辜者咸録其後汝其往哉予乃詣京師登肺石以自明有詔追復皇考官謚之曰獻法曰忠必告上曰獻仍以予爲保氏奉先臣之職宣王之時也孝友第二十三長兄不幸身無後同氣由來本一枝母氏悲傷情有感楙陽立繼理爲宜北堂既慰慈親念幽壤終爲死者知喪禮盡於王父母揚名孝友顯當時予兄允思不幸早世弗及見之予年既壯有二子長曰然明次曰楙陽楙陽早惠見憐於曾大父長至之前夕家廟祭奠予母哭之哀言亡兄絶世予請以楙陽繼之俾承其後以慰母心王母趙氏八十而終王父以哀廢食奠亦不起予以孫承子服斬衰三年哀毁盡禮聞予中外時以孝友稱予宇而不名沔水第二十四猗歟吉甫氣飄飄勳望才猷冠聖朝經武緯文心固美征西伐北地方遥鎬京飛語興讒謗沔水聲詩託諷謡君宰相歡功烈盛頼予忠諫息言妖王有賢臣尹吉甫文武兼資縉紳所慕國家中更版蕩四夷交侵及王即位北伐西征以復文武之境吉甫任專鉞之命惟予與王居吉甫居多大略而忽細故王之左右多不悦者於是讒譖迭興王亦未免於疑方其在京有飛語聞上予爲多方解釋意猶未明予爲歌沔水之什王聽之洎吉甫歸功烈既成君宰膠固中興之績視少康高宗爲優焉白駒第二十五聖慮憂勤既有初一朝德色沮嘉謨賢才遯去嗟黄髮詩什形容詠白駒束帛自兹通下國羣英俄復集東都皇家招隱興王化良自忠言勸用儒王以大業克濟普覃異恩陞予爲大夫于時四方無虞玉心少怠一日師氏韋仲將誅章方上天威肅震寘韋于理於是道德之士老成之人有翻然而去者予心憂焉乃作白駒之詩以爲譏刺勸王留意賢才寬容受諫使在位者無去志已去者冀其來歸隱迹者期於願仕詩聞於上上意感焉於是詔告在外責躬悔過復韋之職束帛弓旌日遣無虚未幾清議歸美士風藹盛天下復見成康之化矣舉讎第二十六先君飲恨在黄泉在禮讎家不共天已死風成無所及後人温叔乃爲賢只知所舉惟才日豈憶無辜被譖年上亦昭情知此事何妨中外任喧傳先人之死蓋出於南風成之譖朝之所悉知終天之痛予亦未忘風成死久矣有子名温叔有才而賢嘗以國子隸業於韋師氏予以問韋謂予曰風成之子好學無猒語言可法容止可則當今貴遊子弟中未有也天道難知不意風成青蠅之行有子如此蓋瞽鯀生舜禹之比他日必爲大器予雖有不共戴天之隙而聞其善行心嘗悦之予既升大夫保氏闕人詔許舉所知以自代予薦温叔王聽之卒善其職恤孤第二十七壽夭前途不易知仲將方艾遽傾危一身永逝嗟無及五女皆孤益可悲納采問名如父在執羔奠鴈及婚期死生不變論交日泉下幽魂亦展眉師氏韋仲將與予爲聯事相知且久一日官車夙駕出于虎門仲將欲有所陳既前而却忽偃于地衛士掖而起之蓋已奄奄矣歸而告殂韋氏無子唯女五人長者以寡而歸宗次者及笄而未聘幼者已十五韋以忤於王暴卒禁中既無卹典五女何依予爲備禮而嫁三人其二幼者寄飬于司諫高之量家俟其長也納爲然明楙陽之婦慈訓第二十八守志當年正妙齡期頤耳目尚惺惺縁深不惑旁門法心著常持内觀經花落花開根永在月圓月缺體空靈臨終切切垂慈訓證位仙階達杳冥母氏早年守寡享壽百歲而視聽不衰蓋由平日常持内觀經紬繹意義晩有所得一日予方朝退趨而過庭呼予而坐兩孫侍立喟然歎息曰吾與汝因縁相際得爲母子汝且華顛吾老可知矣我念人之在世生滅無定暫來還去如虧盈月如開謝花今世之生乃前世之死前若無死今何以生今身之死不明後日之生豈保若解知身是妄直須謹守眞常但能性定命堅所謂曠劫不壞有功行者超升上境無惡業者不失人身忍於夢幻之中莫結寃讎之果吾將永逝勿用深悲臨别之言切須專聽語畢儼然隱几而逝後再以童女得道乃生天上是爲妙慧眞人盡忠第二十九奪哀變禮從王事爲感君恩念舊臣切諫區區還不聽忠懷歷歷竟虚陳青宫本乏元良德白首羞爲諂媚人盡節龍泉吾不恨尚憂周道寖沉湮予有齊衰之憂上㫖奪情辭者再三不得已而從事禮之變也王即位之久倦於政事一一勳舊如尹吉甫召穆公南仲方叔或以病廢或以物故惟予爲老臣上初以宫涅爲太子予力諫之不能移其愛卒立之及王棄社稷嗣王親政淫酗暴虐予又諫之王以予恃先朝之舊且憾前疏怒形于色予乞骸家居一日有使赐酒予拜受之飲畢有後命子雖盡忠於國初不以一死亂吾之真然尚憂周道不有失文武之基緒爾棲真第三十再出頭來事俞多幾回歡笑幾悲謌忠誠憂國嗟無及直語逢嗔可奈何遠望松楸增白髮悔貪祿廩受丹科雪山一境非塵世來此棲真得也麽子生於斯世而堅守古道既有言而不用又玃罪焉䰟无所归情猶不巳哭于宫闈者三日王聞之以予为妖乃命庭氏率其屬以弓矢望聲而射之予無身矣射予何爲於是望故家而靦甚辤王國以遠遊一意西方歷岷峨背井絡蜀之西陲有山名飛越予以先世生於吳會與越爲鄰俯面察之名同俗異又望西極一山高廣殆百餘里盛暑之時積雪凝寒非塵境也山神白輝曰此名雪山往昔多寳如來修行於此八年得道又西極真人久住于此因而證果大夫仙風稟然曷留于此予聽而止焉無幾帝有旨以予爲雪山大王山王第三十一北達京鎬千餘里西望岷峨萬點山荣辱已抛羅綱外是非不到水雲間力誎白虎遺星石匣鎖青龍瑩月環南面稱王朝百里有煩帝㫖爲重頒子方留雪山面被大仙之命旋有㫖以蜀門旺化乃反鶴馭面來東北見萬峯青單絕境可愛久之山神公无長等五人來謁子曰某等識𨽻千斯近見眞官神鋒峻嚴目有光芒聲欬之音震響嚴谷豈天人乎此間自武王伐紂微盧彭濮諸國之長佐蜀君主大軍北向寔經于此逮今三百餘年路僻人稀未有貴顯者來眞官勢焰如此幸示其來予告之實山神曰某等亦猒人间遊於斯者也此山𨽻蜀帝所治名之曰劔嶺其勢北距終南西接岷峨南通卭徠東挹巴蜀廣裹周币殆千餘里此山爲要地也自山王白峰圭託孕爲蜀王太子且百年矣居未有五眞官既聖人之裔清明在躬積徳累行忠孝全莭神遊於此行藏有數宜少休焉兼劍嶺之下近有白額大獸千餘歲矣負此山隅以人爲食眞官既嘗爲天子大臣則山川之神皆嘗所治者又玉音來此自可號召羣靈呼吸變化役遣幽陰驅除此虎亦助天好生之事也予信之乃矯宣帝㫖召集千里之内山川鬼神咸來聽命謂之曰帝有玉㫖以白虎害人命吾爲此山王董爾衆靈誅滅之用命者世享血食否則天有威刑衆曰唯謹聽令予乃仰觀周覽現相變化自見身與山等拔一孤竹叱化長劍屏翳號風雨師清道揮刃一呼響振山谷虎亦怒氣成雲目光出電跳梁反復吾身當之衆力併前斃於刃下又於血汙中獲一圓石狀如墜星公元長識之曰此虎威也予佩之百神攝畏功成因奏帝先陳矯詔之愆次及均功之語帝因以予爲蜀北門山王刑賞第三十二幽明政治雖殊異平直存心理則同孫滌銜寃堪雪恥宜肩力孝未酬功嚴刑不恤笞魚背保奏終期徹帝聰小大神靈皆敬畏清明天地蕩皇風予既即眞爲諸山之王凡所部山川水旱豐凶妖祥功過皆得預聞而平治之青黎山神高魚生部民孫滌女方婚之夕魚生悦慕因拘其魂而亂之爲鄰封白池龍神所察予覘之與女俱訊既伏其辜歸其魂女乃甦鞭魚生背三百黜其職山下有故孝子吴宜肩嘗爲父疾刺血寫楞伽經四卷壽終五年未有所受予爲保奏以代魚生帝報曰可自是小大之神咸知敬仰焉存褒第三十三褒侯以女媚幽王王寵褒兮壞紀綱黜子屏妻天所猒誅良虐善鬼爲殃岳靈遷怒情雖快褒國平民理可傷奏達上穹符允報遺黎仁壽遂延長幽王始娶申侯之女爲后賢而有子宜臼嫡且長仁孝之風見於岐嶷及褒侯以姒進遂寵姒而疏后尋以姒有子乃廢申后以姒代之姒生子王名之曰伯服意謂伯者上無長也服者天下咸服也於是逐宜臼立伯服爲太子大臣諫者九人悉族之穢聞於上帝俾西嶽爲孽以警於王山川鬼神從而不寧三川皆震山摧水壅勢皆逆流嶽神者蓋白帝白拓矩之降靈也從而遷怒移檄漢沔褒斜山神欲埋褒邑褒與蜀接境予訝其太甚即上奏言褒侯固不足卹國人何辜請赦之有㫖言金天之神擅檄所治薄責之褒邑之民免於埋壓厥後犬戎代周棄漢沔褒邑之地於蜀皆帝意也回風第三十四惡人行惡自招凶孝子嚴親意不同爲食成讎情已甚回風反火勢方雄滿懷俠氣猶能吐刮面狂飈訝自攻留與世人爲鑒戒要知聰直現神通劍嶺之南民李轅孝於母薄暮有客投之轅方烹鷄具食客以爲相館喜形色言少頃食至乃脱粟飯也客不舉匕轅曰家有老母病起思肉適之司晨不及供客矣客赧然揚袂而起曰汝以予爲未嘗食肉耶不揖而出夜闌上風縱火以燼其居時方歲寒草木黄落煙焰蓬勃勢不可嚮轅負母而出向天呼號吾適遊其上大不平之因吹氣成風使虐焰自反客執燧猶在手燎其眉鬢欲走而迷顛仆火中僅脱其命訊之則曰某俠士蒲光度也今夏縁都人士女浣花嬉遊有友因醉而觸良家爲人所辱濱死某以解紛之故投入水中幾欲不救訴於有司於是亡命周流半載昨實餒甚心怨於子方爇草時如有人叱之火及子家而爲風所讎今即死矣不作無名鬼因告之語畢而殂明寃第三十五須知人命重於山莫把疑刑作等閑毛氏䘮身尤未雪良能濫死豈容還騰魂附體明寃獄執賊求情伏巨姦義敏一言其利博享人血食免慙顔踰劍之北三百里龜山之下民何志清有男無方娶魚山侯釜之女逾年釜得疾勢急女告於姑請以歸寧許之與其夫偕往至中途記憶奩篋中有黄銀耳璫二垂欲持以隨備父急難行速而忘之欲歸以復取則日西矣俄無方之弟良能踵後而呼携耳璫至曰婆有不豫遣我呼兄且令附嫂所忘之物兄嫂至姻家則兄可先歸婆已顒望矣無方曰弟與嫂行吾將歸以省母氏無方既别移時侯氏悔曰妾家不十里可到無勞叔相從也良能信之遽與嫂别既還而夜深翌日侯訝其女已約而來遲遣人逆于路乃見女死而無首釜疾革而亡其家告於所治何氏以幼子而鞠之月餘獄成良能自誣别兄之後逼嫂以非禮不從而殺之其首不存殆爲虎豹食之矣將就戮良能怨泣龜山之神義敏來告予察之得實蓋有强賊牛資妻毛氏有所忤資路逢侯劫而逼之取侯之衣與毛相易毛與侯年相若也梟毛之首携侯以歸予爲追毛之魂附資之體藉資之口吐毛之詞自陳而得實資赴於理女歸於侯良能免焉苴邑第三十六合靈最貴莫過人不易修持得此身既會胞胎當愛護却縁衣食使沉淪伊予幼幼情何異天地生生本自均從此一方風俗變刈蘭凶釁免傷神劍北里里折而東之兩舍之餘有邑曰苴饒地濟人貧編户有子甲則蓄之乙則或否至于丙丁則不舉矣蓋嗇於衣食以便目前而不恤其後也張千十冨室也租其田而食者八十餘家授田之日即有約舊有男子力能耕穫者留之厥後所生斷不容留率以爲常千十有二子長者有廢疾不任事次子三歲有癎醫卜巫禁皆不能治禱邑之神公孫掌十日不解掌告於予請救之予從焉詢其所以致殃之由蓋前後租民不舉之子四十有奇冥漠無歸共爲崇焉予夢其妻李氏且言之故李氏雖言之千十不悔予乃遣功曹荀明傳予之言使幼子言之曰棄人之子猶吾子也愛汝之子猶他子也汝貪人之力惡人之冗食以耗其穀今四十餘命迫於汝子行旦死矣千十自怨自艾叩頭出血請命於予予爲戒之使改其行千十從之其子乃安自是一邑之人重惜人命生齒漸蕃矣拯溺第三十七秋雨霖霪久不休三江相合勢同流鏡潭壅溢深無極城雉傾摧急可憂白馬遺黎誠善俗黄高仁政乃賢侯栢堅一喝波濤息誰謂驚湍敢敗舟白馬之邑有民八百餘所都當三江之口秋雨霖霪三月不止東北二谷與江俱漲咽於靈嵓峽口卒不能泄波濤泓浸居民昏墊有魚腹之憂邑神栢堅來告曰白馬小邑舊爲民屬今附庸於蜀邑侯黄高仁而愛人乃者天作霖雨害其粢盛三江環合邑人之命不保予以封疆所治與堅俱行既至則水勢壅溢比常十倍民人擾擾若蟻移穴城雉所存十有五六幼者携持而不達老者棄置而待斃于心閔焉於是以栢堅傳帝㫖敕水潤下俾安故流今所謂喝河神者是也自是一邑之人數千之命免於沉溺之患矣雨穀第三十八人言陰德如何種舉事先存爲衆心許氏賑飢將竭產羅家閉糶不容針積而能散天之道冨乃成貧鬼所侵一死一榮端有謂蒼蒼造化意何深巴西大邑冨者百有一二貧者力作度日蜀帝初立歲大荒歉帝雖奉養菲薄勤心爲民而德馨未著餘殃未衰巴西之民死於阻飢者尤甚邑有冨農羅密閉糶而義士許容竭產賑貧來者無窮力不能繼終日炷香祈天請祐邑靈和來孫以告予奏上帝有㫖取羅密所蓄之穀凡五千斛雨之予乃敕喻風師發羅之屋穀隨風旋自空而雨各以色聚徧於郊衢一邑之人無不飽飫羅之蓄藏一日而盡邑人感許之惠往往酬還幸羅之灾從而稱快蜀帝以容爲邑佐密聞之自縊曲雨第三十九苴郊之北巴江西中有龍山險可躋民質素來全孝敬歲荒久已望雲霓曲施嘉澤成秋實免使遺黎病夏畦自此遷居來者衆老人扶掖幼提携苴邑之北巴江之西有龍山焉龍山之下所居民三百户許蚕帝之初全蜀亢旱邑神蘇公長不忍遺黎死於歲凶引咎自責曰臣所部民少壯力作老者休息非不孝也征徭不憚未嘗敢怨非不忠也春耕夏種冬祭天地非不敬也視田之美晝以方隅許爲粢盛既有所收不敢先嘗非不順也有民忠孝敬順如此而旱暵爲灾曾不我遺是臣之罪也吾爲達天聽有命許地祇自理予乃併苴饒之工借巴江之水曲施雨澤三日而止一万有秋邑人名鄉曰嘉澤他居有遷來者漸衆矣殞賊第四十孝婦劬勞爲養姑水清一志念元夫鉛華不御從人訝針指爲生乃自娱禮葬哀深方復祭愚民白晝輒穿窬不惟正節蒙神祐兼示貪殘被鬼誅漢水之源孝婦曰楊靚中衣冠之後也適寒士雍有章有章早世靚中矢言不復他適及囊篋罄空家無兼侍姑老且病媒妁日至靚中曰人之所慕色與財爾妾家貧素方丁大禍今好逑之心不已意者以妾年齒未衰氣血尚盛身無惡疾唯此爲逑爾妾豈忍棄臨年之姑忘結髮之夫革面而事他人乎針指小巧素所不汙爲人縫緝浣濯粗以自給妾與姑老甚不得已則待姑百年改卜未晩也乃自斷髪喪面不御鉛華以婦功自給如此六年姑死禮葬之三日復祭里人助者百數有賊乘其出踰垣啓鑰盡携所藏靚中未知也家有土地白致一與邑里正神康潮生欲治之適會予來褒中就以此報予遣陰兵三十人執賊于市舉揚所竊歷告于人曰此節婦楊氏之物也當還之已而舉手向口自嚙十指盡而死北郭第四十一人之嗣續貴非輕只在心田種果成欲速區區還是拙招尤累累豈能平栽培卉木姑爲喻周卹孤窮俾用情貢子承家號神保乃知報應自分明蜀都北郭民王尚忠富而無子行年四十心憂而計速廣求妾媵終無所出又取本宗之子以爲繼紹然資性險急妾媵小不如意則鞭笞之轉易之飬子有違教訓則復逐之用心愈急爲計愈疏歲月因循行將半百於是大設供具延請羣望覡祝巫謌月餘不已予因化一居士語之曰栽植桃李既培壅之又灌溉之日月未久剔其枝葉以冀速長復移其處加以糞壤時令未至撥其根荄視其堅否見其種植枝葉潤茂又復取之棄其舊土又復移易用心過勤終不成實可謂智乎曰不可予曰汝之求嗣何以異此吾今勸汝寧汝心身改汝前行寬人之力容人之過婢妾可蓄者留之不可者嫁之宗人子既捨所生呼汝爲父堅汝初志略其細故汝室有子勿萌棄心脱人之死濟人之急周人之窮恤人之孤一志行此聽命于天若此三年當有善報語畢而隱形不見尚忠信之以爲神告厥後嫁婢一十三人所飬二子皆爲娶婦指授别業使爲久計葬貧人父母五十餘喪成貧男女八十餘婚三年之内果獲貴嗣名曰神保長而克家焉返火第四十二兄弟從來本一支如何鄰壤便相闚苴侯邀利情難測蜀主淳宗自不疑烈焰亘天方可畏雄風刮面返遭危空中明語垂端的始信神祇不可欺蜀王魚鳧有弟葭萌封之于苴是爲苴侯久之苴遣使求賄蜀王不應於是遣人焚蜀府庫火勢孔熾予聞之命風師返火明言苴之無道須臾苴之行人皆死於火自是苴蜀交攻者三年竟不勝蜀平苴第四十三苴侯立國號葭萌不念魚鳧是弟兄戈甲相侵民横死封疆密邇氣虚争更因信使談形勢現岀神兵示重輕葭邑一朝心伏義免教塗炭及黎氓苴蜀既交惡干戈相争者久矣蜀王猒之遣莊蘇議平苴侯不聽莊蘇因言蜀之兵衆手指西隅予因現神兵而警之苴疑其襲己遂乞盟焉使者言之于王王爲予立廟於都之北費丁第四十四生前直道雖罹禍身後遺靈恥括囊君寵五丁忘武備予方三狄抗封章只知運土增妃墓不信談兵拒敵疆謂我妖言何足較從而毁廟又奚傷武都山棈化爲女子色美而豔蜀中所無有聞於王開明尚王見而悦之納以爲妃無幾物故王念之不已築墓使高以示不忘武都長人費氏五丁從而媚王以大力故負武都山士增壘之不日墓與山齊王名之曰武楷山謂妃死而懷土也既而王親信之寵用之日侍左右曾不暫捨王亦多力恃勇既得五丁自謂空拳可以格戈戟奔走可以敵車騎於是不修邊備至撤亭障罷烽燧予既爲之神享其血食且彊秦接境慮有不測乃化一文士自稱北都張生叩閽上書其略曰臣聞專德者昌專力者亡昔者堯舜禹湯之治天下在廷之臣姓氏昭然未有以力爲專者但匹夫之勇不可以爲恃絶人之伎不足以威敵飛廉惡來無救於商辛羿射奡舟竟死於非命近世三狄長大多力卒加誅勦今邊隅費氏昆弟五人初無道德以力爲任王以其身相長大而賢之乃不修武備臣以謂費氏之力一可當十以至百人爲敵力無施矣若以置諸臺皁列爲僕御俾其倮股肱執射馭奔走從事則可若以爲折衝鄰國則不可要其所比不過赤白長狄三者之如也臣願謹先王之慶基嚴彊秦之邊備無以匹夫之勇而弛三軍之令王不悦曰汝諫吾謹武備而誚吾養材士是欲獵而廢鷹警賊而廢犬也予力辯之時五丁在前怙王之寵欲來見辱予乃隱而不見五丁以予爲妖又曰此殆北郭張仲子也於是毁予廟貌予亦不較焉石牛第四十五巴蜀相攻蜀冨强秦人貪蜀巧思量非干孝惠興謀善自是開明用意荒礱石爲牛山下立鎔金作糞尾邊藏好財不聽忠臣諫鑿路興兵致後殃周室寖微諸侯互相侵伐巴蜀交隙秦與蜀鄰惠王用司馬錯計啓謀吞蜀而蜀道險甚行兵無路乃於秦蜀之境鐫石爲牛形製既大置於草中又鎔黄金爲餅置之尾下如此者五所陰使人伺之月餘金餅爲人取去旋復置之所取既頻蜀王知之使人臨蒞之數月得金千餘斤乃命五丁開鑿險路興兵五千率挽石牛以歸方發兵日予復化形爲儒者以仲弓子長爲名詣闕請見予乃上疏言開路非便獲金非利王笑謂予曰天不愛道地不愛寳吾以社稷之靈石牛黄金自入吾境黄金至寳也可以冨國可以强兵可以寬民先生疑鄰國之詐誠過計焉豈有捐金數千而設詐乎先生少遲之石牛行旦至矣予仰天而呼潸然出涕王以予爲不祥左右掖予出予從而隱焉五婦第四十六秦人貪蜀志并吞險路開成入蜀門尚恐石牛彰詐計更將宗女許新婚不思大國難爲偶將謂誠心有所存逆耳固知辭枉費忍持緘默負君恩石牛既歸秦王曰此用之開路則可矣若牛歸而無金則吾計敗矣乃復遣人與蜀約婚曰秦與蜀鄰親仁而善鄰理之常也吾有宗女五人請嫁蜀王王其納之蜀王大悦予聞之嘆曰彼强國也此物奚宜至哉王乃遣五丁迎秦女於境上王方日備千乘候于北郊以伺音容予乃於衛士中現儒生相自陳上疏諫之王怒曰汝非北郭多口張仲子乎讒言見侮者三矣敕左右兵之予乃現忿怒之相衛士驚潰予獲免焉顯靈第四十七忠懷不忍奏侵蜀力諫吾君反被嫌怒相本期鄰敵畏大身俄爲玉音潜路迂七曲行方徹山壓羣靈命盡殲從此一隅知敬仰劍南聲勢已炎炎五丁既迎秦女以歸蜀人萬衆小大歡悦蓋昧於禍機以非爲是以弔爲慶衆人之常見也予乃於劍嶺之陽化大身相横截於路意謂秦女畏駭可以回轅秦蜀之人觀者駭異武於譊譊中聽有玉音若曰天之所廢不可以興蜀王是也天之所興不可以廢奏王是也子誠忠矣如天命何予乃收縮會五丁識之曰此必吾北郭神張仲子也予將搏而食之萬衆呼聲震動山川五丁逐予予乃經山腹行路成七曲將入洞穴爲丁所及持予甚急予不得已化身百倍任其揺拽尋以首穿山頂回光反顧以震盪之山隨身動五丁與秦女俱至嵓下山摧勢迅於是五丁五婦皆陸沉焉爾後蜀并於秦吾亦無憾大丹第四十八老氏中原猒甲兵西昇甘作化胡行雲間車騎排千里所在神祇送十程殺命心公寃自釋吞丹志一體斯輕乾方不是潜身處却住坤隅慰衆情予以蜀亡社稷變置百靈廢祀血食無歸神遊崆峒聊以休息忽雲衢中旌幢車騎過者三日山靈相謂曰景象如此殆有聖賢經過已而老氏將左右二眞人自東而西予列拜于西嶽所部諸地祇中西嶽有令諸地祇皆拜送十程予在翼護數一日請問懇于老氏眞陳往昔在蜀功過老氏曰大道之行天下爲公爾既公於心三諫於蜀爾之功也五丁五婦雖死於汝以公存心亦非過也既有功於蜀今國號雖秦而井邑仍蜀也爾宜永享蜀祀以慰斯民乃命徐甲取囊中藥一粒授予曰此大丹也汝宜餌之大者與道合眞丹者與心爲一爾後五通具足非汝夙昔之比中原擾擾吾甚猒之今將入西域行化三百年後西方之教法盛行當來中國爾宜信之予敬受焉巴都第四十九大凡臨事莫欺心心鏡纔昏禍即侵巧計受珠誇倖械厲聲决獄逞胸襟鞭笞二百難輕恕受痛三旬可自斟廟貌焚修非所望秖將直道報知音奏既并蜀使張儀虜巴王而取其地因以巴都爲郡久之巴都守相伊庭儀以太守疾攝事郡民張威家奴萬眞投井而死獄威月餘威不任箠楚誣服曰實威殺而投之蓋萬眞先有所犯威嘗撻之不三日眞竊其貲欲逃他所爲威所覺眞臆度不免乃自盡其命實非威殺之也獄成威之子聞之以大珠百枚遣人獻於庭儀庭儀謂用事者曰汝醫者别日但以小篋作風藥來雖在客前無忸怩也其家甚喜至日候門獻之庭儀適會客十餘方具酒肴醫者至旦延之坐末酒三行醫起以獻藥爲言伊受之方入中霤旋悔之曰事有不明恐招謗議命出之封提如故伊復命醫者開篋取藥猶恐事泄分獻衆客翌日以威之欵伏辜卒陷大辟威之子行哭於市仰天呼寃曰還有神靈察此寃抑否予見之夜迎庭儀及威之父子醫者魂爽訴之得情庭儀曰珠實某取之篋中之藥乃素所備者珠方入而易之既受其珠復畏太守知之故不敢易其欵予命鞭庭儀背二百明日所訊之人寤言皆同方共訝之俄聞庭儀疽發於背號呼月餘乃死威之家爲予立廟一郡之人從而見敬婆娑第五十人之生子要尊親自幼劬勞育汝身冒姓固知羞所問所生寧可棄其貧官中被罰情難忍夢裏遭笞痛亦均一旦寃人成父子鄉邦風俗可還淳巴蜀二郡之境有山曰婆娑山神轅安行來至巴郡渝水之上見予曰某之所治居民勤而信孝於祖禰敬於鬼神事無大小占之龜筮云吉乃敢行焉山王嘗總蜀神今巴蜀黔漢列爲四郡秦人視之一槩爲蜀某之所治王曷臨之予以非公事不欲輕往一日安行又至曰某之治有民周符本袁氏子某之族也去車從袁俗省之也符之生日時皆惡乃祖忌之命勿舉其父平叔不忍棄乳養于外三歲正旦拜諸孫中翁乃大怒詬其子曰汝欲以此命凶之子殺我耶平叔提携而出適友人周寧之相遇於途且告之故寧之曰我未有後人今請養之他日吾室有所出則還君之姓平叔與之自後周日益富袁以家禍連綿貧甚及周有子而前約不復講矣寧之既亡平叔時往訪符或告之急則亦相濟至于數四平叔私許以爲符實己子且嘗念我乘間爲符言其始末會符之弟來適聞平叔之語叱平叔出明日投牒於官以平叔之言不直笞之平叔炷香于頂以告於安行且言子敢笞父安行知其詳念非符本心未有所裁王爲决之予乃與安行偕往夜夢於符見己之初生及王父不舉之語及乃親乳養之事夢未畢哭而起欲自决又以形於公牘牽制於弟隱忍間予復夢中責其不即聽從笞之百下符既覺達旦不寐明日拜于袁氏之門謂平叔曰符不早悟爲大人遺體令神來見責撻我幾死今悔矣且周氏自有子可承祭祀符已不願預其家產唯吾父之從鄉人知之以符爲賢周之子筮乃分家貰與符任其歸宗袁之夫婦老且有託焉梓潼帝君化書卷之二
