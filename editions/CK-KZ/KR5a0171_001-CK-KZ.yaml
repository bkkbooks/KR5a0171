  text: 增刻道藏輯要
  hash: sha256:90d4526afc9ad639e0358a6e37f3ea9e406e98db79ec909cbcb8012e0d7d4cee
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0171_CK-KZ_01p018b, image: JY255/CK-KZ_JY255_01p018b.png}
body:
  text: 文帝化書化跡總詩緣事將成信有時人能宏道復何疑不因百尺樓工畢爭得多生事跡垂典實任從機衒耀始終庶可見云爲從今又被人間世傳出淸河百首詩第一元命化混沌初分濁與淸東西分野景鮮明中含太乙氤氲氣吾已潛符造化情獨占宮辰雙女上專司火德五行精率然自厭居荒落脫蛻終期道果成余本吳會間人生於周初迄今七十三化前降内傳化字世人誤傳作代字今正之按大洞經序帝君於周武王乙巳𡻕生於吳會卽今平江是也第二流形化遁跡靈巖不記秋目光開閉自剛柔吞霞滿腹無饑渴養息潛眞任去留數足轉形歸孕乳時來隨分事王侯會稽勝地堪揚化張氏生身世屬周余方遊人間忽至會稽山陰見一隱者年五十許具香燈仰天而祈時仲春丙夜天文煥爛張翼二宿昭然在上俯而聽之隱者姓張適符列宿余於是生焉第三生民化北堂一夕夢吞珠隱隱襟懷震夙初厥月誕彌延穀旦靈光充滿耀蘧廬儼思不與羣兒戲嗜學仍於百慮疎耆舊相逢每相語謂吾他日是洪儒張氏出黃帝之子名揮始造弦矢張羅網世掌其職子孫因以張爲姓顯於吳第四易俗化吳因泰伯遺風後一變民情似島夷翦髮務從安澤國文身將以禦蛟螭性情不願隨時俗冠屨惟思習禮儀始也親朋嫌矯節終焉鄉里翕從之余之鄉翦髮而文身蓋便於入水而習成夷俗也余旣成童矣心所不樂乃尋冠履自習禮文内外莫不以余爲異及其久也從余化者十有七八焉第五稽古化三吳僻處在天涯文物無稱少麗華帝典未嘗傳遠裔皇墳那得布農家幸因膚使傳縑素頓令卑情識制麻從此一方絃誦美區區風教已堪誇余鄉距京周甚遠文物無稱焉一日有耆舊謁吾父者口誦唐虞大訓數篇曰有中國使人傳此予好之就彼習焉隨口記授無遺於是邑人願學者從予習之皆以余爲師第六奉眞化寂寂茅茨晝掩門行人稀到水邊村深耕偶得黃金像久瘞音意埋也猶纒紫葛根不忍鉟音披鎔虧體質聊將焚獻度朝昏送歸海嶠𧟄災沴音利陰陽不和也一境生靈賴此恩余之居事畎澮忽於鉏下得一金像頂冠如崇山疉翠被服如霞綺舒麗紺眉月面儼然慈祥憑几巍坐荷花爲臺高尺許重鈞餘初未知爲何神詢之故老或曰元始天尊像也昔夏禹理水冶金以爲神物用鎭方嶽豈此像之類乎吾家素貧雖迫於衣食不敢起鉟鎔之心一日海風翻浪遠近奔駭非人力可支予謂眾曰家有金像得之儻來今爲眾捨之以祈海若冀其安息乃率眾乘高以像投狂瀾中俄而風止潮回一境獲免邑人以是爲德也皆以糗糧布帛爲謝拒之不能自是温温然家道苟合矣異時記憶投像之所蹤跡之砂磧有光掘之舊像仍在歸築宮室以安奉邦人敬事之第七甯親化母氏劬勞𡻕月深風寒暑濕久相侵醫巫胗音軫脈皆無效鍼音針灸攻肌殆不任剔骨和羹償宿願吮音允疸出血本誠心分明夜聽神仙語二紀延年表至忱余旣冠母氏六旬矣少時勤於織紝飲食失時常致疾疹逮至衰暮重之以六氣所淫遂成疸瘡舉發於背始以巫覡音檄祈禱中更醫工砭劑月餘皆不效予不離臥内日夕省視未嘗解衣而息計窮矣乃爲吮疽大出膿血疾少間醫曰疽根附骨未易出也越三日復吮之忽覺口中充滿吐而視之有膜如綿纊膿乳如米粒母氏漸安而以病久食少復成羸音縲瘵音債醫曰此痼疾以人補人眞補其眞庶可平復予因夜中自剔股肉烹而供之忽聞空中語曰上天以汝純孝延爾母二紀之夀翼日勿藥果符神吿第八幽婚化婚對由來不等閒此生奇遇是前緣靈骸不朽如相待淸夢重遊豈偶然嗣子已堪傳後業芳魂俄復掩重泉壯年頓絕陰陽事眾議稱余骨是仙吾少也賤性靜而寡合年逾冠矣未有室家非特良媒之不至抑亦子無好逑之心也向因母氏嬰疾以未見孫息爲恨予亦有不孝之憂一夕夢至一林麓孤塜巍然傍有一門一女子靚音淨妝坐其中顧予而語曰君非張善勳乎予訝其以名見斥也請問其由女曰妾與君居雞犬相聞乃仲氏也曩者妾之叔父與君會談君之美以爲好學尙禮古君子也議以妾歸於君吾父以君貎異寢而難之然妾之慕君心已一矣後許於鍾安孺鍾富家子而淸議無聞妾心恥焉由此得疾而終今三年矣妾之來此以君之故君曷爲我圖之予悸音忌而寤月餘再夢如初暇日因與友人儀堅成縱步尋幽忽至一所宛然夢中境也方吿吾友共訝之塜中人出呼子爲郎蓋夢中所見者也儀實仲之舅家因走吿仲之父母迎女以歸卒爲婚姻云第九淵石化春光淡淡景遲遲春水溶溶淸且漪羅綺岸邊揺倒影神仙種裏悟前知白紋細篆成淵字靑石圖形似小龜生子立名符感兆貴知天與自無私仲氏婚三月鄉人士女已嫁而未孕者相與臨神潭摸石得石者宜男得瓦者宜女蓋舊俗也仲與遊人中吾母謂仲曰潭水靜深黝然莫測宜從上流淺處求之仲方徘徊潭中忽起花沫如吹仲以手捫之得一石大如雞卵六出如龜狀靑而白紋隱隱如淵字感而有孕旣生名之曰淵石方齠音迢齔音襯仲忽吿予曰吾兒眞似君者宜善視之妾與君世緣盡矣語畢而逝予乃不復再醮第十馴雉化天摧地裂情堪擬荼毒無門救二親負土培墳酬怙恃寢苫音占枕塊益悲辛黃泉路隔嗟何及白雉情傷亦自馴禮制三年心罔極節哀於以率中人余年三十有六𡻕在作噩音諤疫毒流行人無免者鄉邑蕭條路無人跡予父八十有五母七十有三盛暑中皆得疾同日而逝於是自持畚音本鍤音插以經營大事乃於墓傍倚蘆枕塊以終三年常有白雉一雙棲於林上每遇祭奠飛鳴而下俯仰咿啞如欲言者及終制而去第十一回流化壘築墳岡不憚勞何期平地發波濤松楸欲變無何有棺槨猶憂不可逃大洞仙經除厄難眞金聖像鎭鯨鰲秋霖已霽湍流息喜見平田廣且高余考妣墳岡去居之南纔百餘步蓋一時匆遽卜之云吉自以爲便於省視初不遑他恤也葬之五年墳西三十里洪水暴發平陸成溪以墳爲岸水澒音汞不竭勢頗浚急吾心懼焉欲攺卜之無及矣乃齋戒守墳日夜誦大洞經不輟並取家藏金像而嚴事之期於無虞次年秋雨霖霪傍溪湧漲數流爲一吾益恐及水落視之則墳前溪谷變成堅埆廣一里餘自是松楸無害矣大洞經序云三眞人授文昌大洞經金像授法籙行持屢獲感應第十二降瘟化雙親之死爲瘟災切骨銜𡨚痛且哀生育恩隆情不匱幽㝠路隔憤難開神兵執崇明中現法籙傳眞夢裏來落筆神符救民瘼豈容五鬼暫徘徊余之二老皆死於瘟時盛暑嬰毒荼苦滋甚每念瘟疫之酷恨之切骨而幽㝠路殊力不能報心常怏怏比因墳岸回流實自大洞眞經金像之力於是益勤持誦而敬事之冀獲陰祐以治瘟鬼又三年忽夢所事金像語予曰大洞仙經爾熟記矣大洞法籙爾未見也今當授汝以治邪魔非惟可以契汝初心亦可佐天行化助國救民也袖中出書示予拜而受之旣覺書在枕前其一曰大洞籙又一曰大洞法因開籙讀之至天騶甲卒一萬人度之句忽風雷晝瞑金甲朱綬者無數列於予前俯而聽命一人持紅旗立於眾先白予曰願聽使令予方恍惚不覺厲聲謂之曰吾要爾等治瘟鬼此鄉張屯使家闔門病瘟爲吾驅來語畢一持旗者領百餘人入其家俄頃執鬼五人出有䝉虎皮者冠雄雞者貎若犬者若鳥鵶者若驢馬者所執有水火羽翣音接金鑿之具予怒而叱之將滅其形彼乃有辭曰弟子元伯等歲運所生歲氣所成所遊有方所病有人陰譴重者受其災天命絶者至於死亦非弟子等敢私若䝉眞官賜以寛貸此後願聽約朿遇行瘟見眞官符籙所在卽不敢至矣予因依法授以教敇而去閭里有病瘟者與之符法皆得全活第十三好生化風寒暑濕因天變飮食興居病在人黃帝脈經詳子母神農藥性辨君臣按摩鍼灸隨輕重補瀉推移審故新但得天命無橫夭勤勞不惜此心眞余以法籙救人疾疢音稱眾矣遠近之人踵門求治者不可數計其有染瘟病者著邪祟者受瘧厲者逢殃魂者遭鬼擊者犯凶神者遇惡氣者一一全活然有臟腑寒𤍠虛實之不齊飲食起居勞佚之各異或因喜怒哀樂而感於内或因風寒暑濕而受於外此皆岐伯神農氏之學非道家法籙之事也人有懇於予而不能全其生者予實赧然不足於是講究脉理翫味藥性討論五行之勝復習熟五鍼之迎隨勤苦六年始造其妙自是天命未盡者無橫夭矣第十四天官化作善家庭祗自憐不期聲譽乃喧傳名聞王國心無愧位列天官事有緣六氣和平方晏樂萬民疾苦易安痊當年稱職吾何力君相明良化使然余活人眾矣或聞於君上方以砭劑爲事而又爲京周所知驛召至都旣以國君所薦又厯試之以予爲醫師掌萬民之疾苦隸於天官予甘心焉於是教戒徒屬使勤其業蓋成王之世也時王畿豐稔音飪六氣和平民少札瘥之疾良由上德之所致予得以稱職焉第十五薦賢化人之有善如吾有已達仍思未達人大智潛心能創物仙方治疾可通神推賢汲汲誠無隱自代區區意本眞奏徹宸聰䝉異賞驟陞諫列作臣鄰余之屬有瘍音羊醫公孫智叔者賦性慈慧而記問詳博深明百藥之性味創造丹砂雄黃礬石磁石石膽爲五毒之劑其說蓋取丹砂養血而益心雄黃長肉而補脾礬石理脂膏而助肺磁石通骨液而壯腎石膽治筋而滋肝外療瘡瘍之五證内應五臟拘之以黃堥音謀瓦器熟之以火候藥成傅與敷同瘍無不神效乃以其法著於典則予自以爲不如彼而位居予下因舉智叔自代以兼予職未幾上躬不豫鬚有疽生一夕決潰厥勢危殆以前藥傳之應手而瘥於是智叔始有醫師之命王以爲直情無隱所薦得人宜膺上賞遷爲司諫第十六格非化太醫活國理非輕瞑眩輸忠政乃成形迹相忘宜自釋樞機不密禍由生微言忍使彰君惡削藁何妨隱直名但得聖朝無過舉不辜榮祿是眞情王若曰咨爾善勳直情無隱朕念良醫活人太醫活國今寘與置同爾言路以旌汝賢汝其以救疾之心救正吾失嗚呼惟良藥苦口利於病忠言逆耳利於行汝徃欽哉毋易所守予三辭而後受之旣與七人之列日近淸光雖君相聖明無大過失而予憂君憂國之心一步趨一食息未嘗少懈也成王幼冲之時聽政於周公及親政事久矣嘗有不平之語予恐左右得以乘間也每以君臣始終禍福幾微爲戒而諫章屢焚人無見者故公之東征雖有四國流言召公不悅之隙而終能保全者予亦少有力焉第十七榮歸化十年月無仕抛桑梓一旦榮歸復里閭嗣子丱音慣童驚弁服田園蹊徑訝邱墟遊仙夢覺空勞擾涉世情疎自卷舒再識北牕春睡美任從雞喚五更初子在京周十年久違桑梓倦翼思還每念怙恃無恙時身在草莽及怙恃旣失乃受榮祿雖食稻衣錦何樂之有一日見周公䲭音笞鴞音囂之什惻然有感於是起歸與之嘆告老乞骸之請數上始從其欲公鄉大夫設席東門之外旣歸里人迎候子乃自近郊舍車而徒鄉曲以子爲榮第十八敦宗化宗人本是一根生貧富誠難較重輕祿廪儻來何足吝親朋至此若爲情死生並與周婚葬俊秀仍須爲作成他族聞風喜相傚三吳漸有義莊名張有數族居多貧窶音巨予歸之後徧求訪之幼者已壯壯者已老死生榮悴惻然可驚其貧不能自振者猶故也於是興起義莊以淵石主之貧困者周給之疾病者醫藥之男女長成者婚嫁之子弟俊秀者教養之他族聞風翕然相傚義莊滋廣習俗漸美矣第十九歸寂化聞說西方大聖人苦空寂滅以爲眞行歌自信浮雲喻坐想徒勞夢幻身得訣坦然超彼岸忘言聊以穀吾神從茲始悟歸根理南北東西任屈伸余之在朝聞方外之言曰西方之國有聖人古皇先生者不言而自化無爲而自理以慈悲爲主以方便爲門以齋戒爲常以寂滅爲樂視死生如朝暮等恩讎如夢覺無憂悲喜憤之情蓋知浮生不久求於無生者也予嘗慕之及辭榮而歸道逢隱者行且歌曰朝陽之暾音吞觸石生雲初焉髣髴已而繽紛隨風而出蕩漾無垠音銀俄變化以歸盡杳不知其所存伊仕者之利祿忘其勞而駿奔忽暮景之見迫畏大限兮逡巡將投足於幽趨爲異類兮芸芸予聞之始也駐車而留聽少焉憑軾而敬禮終乃下車而泣謝謂之曰適領妙理深契愚衷願惠格言以度殘喘乃於通衢百拜而力懇之行歌子仰天而嘆指予以心印授予以正訣曰此西方聖人古皇先生歸寂法也子能念而習之可度生死死而不亡證無量夀若果終於彼岸則可成正覺如止中道而廢則猶能擇地而處可爲神仙予受教焉於此塵緣旣畢百慮頓灰時丁丑仲秋會集親友留頌而逝頌曰秋風瑟瑟秋月白白得吾之眞知身是客第二十君山化君山一境最淸幽鶴馭徊翔爲少留湖景分明從晝夜林光踈密任春秋無身不顧千年藥有道誰貪百里侯極目烟波供受用飽聽欵音襖乃音靄看夷猶余旣遷化將往西方適至洞庭君山之上愛其勝景因少留焉予時上無君相臨制之威下無血屬繫累之念超然物外獨往獨來水光山色四時可愛吟風弄月此樂何窮追思前
