body:
  text: 北郭富室智全禮仲春修祀一室盡醉暴客王才者約其徒三人謀劫之是夜未央推戶直八縳全禮家男女良賤九人婢妾七人唯全禮之妻與二女未繫之旣取其貲將亂之全禮之妻惶惶乞憐幼女舜華年十五與其姐舜英抱母而泣才欲逼之華駡曰餓賊犯吾家張神君未知汝也語畢其家司命崔瑄與智之祖禰告急於余余乃遣功曹輔興領陰兵百人治之所縳全禮以下繩皆自解盡執其賊翼日吿於里正聞於郡悉誅之第六十一殺生化蠢動含靈皆有命貪生畏死與人同因思骨髓脂膏味俾在砧刀鼎鑊中不顧𡨚魂隨影響只知滋味潤喉嚨杜章享盡前生福業果成時報不空卭有杜章望帝之友也生於富貴父祖好宴會習以爲常凡烹割之事章躬親之及長自持門戶厨饌無虛日膾炙方離口刀杖巳在手矣後以災禍相繼家道零替無以爲生爲人屠劊以就口食所取人財名過命錢又以飲啖兼人饕餮成疾纔方飽滿尋復中虛而性嗜肉味日常不足及以取魚以弋彈雀所見飛走皆萌殺心中年生五子皆無指口累所迫過命之貲不足度日恓惶無聊尋有癩疾肌膚破裂膿血流潰見者揜鼻矣自是饑火所燒復受疾苦投井自盡爲人執之極口辱駡於是仰天呼𡨚余見之訝而問里域主者孫洪叔言其詳且言此人祿盡而命長尙餘五年余旣知其造業之由又憫其受苦之酷且𡻕月方遙惡其日夕怨苦天帝乃遣功曹易其心志使之以手揭瘡皮以自食之又以指染膿血吮咀求味宣言於人曰毋作殺生業以我爲戒如此逾年以準未盡之數命斷而死諸子皆殍焉第六十二酷虐化公孫武仲處心亷鞭撻諸胥失大嚴資水賴恩還縱吏酷民誅取郤無厭化身戒勵誠惟一改行寛平利可兼裁抑有餘增不足吏民兩邑惠俱沾牛鞞音悲邑令公孫武仲治邑以亷而待人不恕左右之人小有過失笞一二百蒞邑逾年而胥吏無全膚吏怨之資水邑令賴恩性貪吝以苞苴爲常日用飲食𡻕時衣裝取給於胥吏以民事造庭者無問曲直悉付之狴犴音岸恣吏誅求意足乃已吏意未厭則遷延𡻕月置而不問民怨之余以二邑之吏民被苦乃化身爲蜀郡丞長孫義行諸邑觀風俗劾音核武仲之虐吏賴恩之酷民二令叩頭乞免余戒勵之尋隱而不見後知郡丞初無行邑之事二邑咸以爲神而敬信之武仲改而忠恕恩亦變而亷潔焉第六十三憫世化周室隳頹爲不仁蒼姬一旦變嬴秦慘刑暴戾無和氣詐計窮兵又幾春不忍中原罹此禍願開方寸濟斯民上天有旨垂俞允雨後乾坤又一新予嘗仕於周以忠盡命血食於蜀未幾蜀八於秦已而周喪天下皆嬴氏矣秦任刑法視民如草芥秦衰而干戈又起中原塗炭於斯久矣余以久處靜境思以拯斯民之苦乃飛章上聞帝從之若曰白帝子遊人間久矣而暴於殺伐今已遣赤帝子代之矣汝以本司火德今當應世以爲赤帝子之後余受命焉第六十四咸陽化護持全蜀幸優遊應世情牽强出頭被𧮂不成膺繼統殺身空與結𡨚讐封王緣薄終何益報母心酸未肯休那得身爲率然相盡吞諸呂祛幽憂余之懇於上天將以化身援天下於塗炭之中躋斯民於和樂之地奈何帝命以余爲赤帝子之後玉音可畏余不敢抗靜言思之非所望也俄有九天監生大神逼余受生於雲霄間下視咸陽火秦之後宮闕鼎新漢帝方與戚姬晤語監生謂余曰此所謂赤帝子者也今爲漢帝矣余縱目間爲監生大神所擠墮於帝側戚姬之懷恍然而覺帝以余生骨相相肖舉止可喜名余曰如意余雖孩提中而本志尙堅語言顧盼尤愜帝意帝尤鍾愛每以余兄爲不類薄之晚年欲以余爲太子旣不果帝萬𡻕後卒爲呂氏所殺余母之死尤被酷毒余深悉之方㝠㝠間見母受苦時思得復爲率然之相盡吞諸呂而後巳也第六十五卭池化恃勢凌人不可爲無辜母子被誅夷銜𡨚入地至極矣不共戴天良久之諸呂後身同一邑雙親乞命在斯時海波平陷四十里還我當年受百罹余自罹呂禍之後神遊㝠漠又無職守嘗畜宿憤思欲報之已往修偵不復問焉雖諸呂死拘幽㝠造業深重厯年甚多逮再生亦久遂訪西湖之濱有邑名邛池邑令呂牟呂后之後身也邑人多呂氏葢宿業相尋諸呂造業之黨也萃於窮荒余母夫人亦生於彼復爲戚氏以前生享福太過至此而貧悴所嫁張子年老無嗣夫婦以芟刈爲業一日野外相顧而語曰生身窘甚辛苦自養暮年力衰將不免於溝壑今六十而無子是天將殺之耶乃相語割臂出血𤃉厂心於石凹窪去聲中以石覆之拜天而祝曰人皆有子惟我獨無今血氣薄少不能施化願此石下倘有動物生焉亦遺體也余識母氏心惓惓焉一念感之從而寓之明日二老復來揭石視之血化爲蛇金色寸長余所爲也母收養之逾年頂上出角腹下生足能變化每天欲雨余爲助之身旣長大腹量寬邁見羊豕犬馬輙食之邑令有馬色潔而駿牧於水際蹄傷吾足因拘而噬之焉葢呂産之報身也邑人皆知余詳訪於余家而不獲逮余父母入於囹圄責以三日求余無狀將見殺焉次日余化儒生謁令解之令曰張老夫婦家養妖蛇食人六畜久矣今又食吾馬吾將殺之爲民去害張不見聽是彼自爲妖也今必戮之余曰物命相償宿業所致遇彼吞噬亦非偶然今君爲畜而殺人豈令尹之事乎令叱余使退余復語之曰君有死氣浮於面顔宜善自愛他日無悔語畢余隱形不見令之左右皆以余爲妖余乃奏天稱𡨚陳以前世子母無辜死於諸呂今適逢之願與之較辭上而未報因變化風雷呼吸雲霧白晝而暝一邑之人相視而語曰汝頭那得爲魚以手相捫頭面而泣一夕揚海水以爲雨灌注城邑周四十里皆陷余以身載父母而出焉時孝宣之世今所謂䧟河者是也第六十六解脫化嗔恚之心莫易生此心生處是無明只知直理堪平訴不得琅音輙徑行謫受大身遭𤍠惱塡還𡨚債慰羣情世尊一語消除業郤得當來面目成余前以呂后𡨚對奏帝未報而擅行之雖一時快意宿憤頓消及心定氣平良用深悔翼日玉音薦降以海神晁閎劾余擅用海水䧟溺平民五百餘戶以口計之二千餘命除里域所具余前身仇對八十餘人半在城隍半居附郭外其餘生齒皆係夭枉帝命賜譴以余爲卭池龍而奪其神職且使天吏監臨不得干預雨澤覊囚於積水之下連年旱虐水復爲泥身旣廣大無穴可容烈日上臨内外𤍠惱八萬四千諸鱗甲中各生小蟲咂囓不已宛轉困苦不計春秋一日晨涼天光忽開五色雲氣浮空而過中有瑞相紺髮螺旋金容月瑩現諸勝妙希有光明山靈河伯萬象稽首讚歎歡喜聲動天地復有天香繚繞四合天花紛墮隨處生春余乃耳目聰明鼻觀通徹心淸口潤聲音發揚仰首哀號迄垂救度萬靈諸聖道衞先後咸謂余曰此西方大聖正覺世尊釋迦文佛也今以教法流行東土隨教化身將往中國爾旣遭逢宿業可脫余遂起改悔心生悲愍念身自踴躍入天光中具陳往昔報應之理世尊答言善哉帝子汝於向來孝家忠國作大饒益又復憫世生護持心因果未周仇敵相爭以人我相肆興殘忍遷怒於物業債當償今復自悔欲求解脫汝於此時復有前生𡨚親之想與夫嗔恚愚癡念否余聞至理心地開明内外罄然如虛空住無人無我諸念頓息自顧其身隨念消滅復爲男子聽佛宣說得灌頂智得大辯才得神通力得圓滿相龍天八部皆大欣悅余皈依焉第六十七仁政化嗔業焚如障最深堅持鎧甲莫容侵瘡傷爾體猶吾體痛切他心似我心吏旣不欺終幹蠱民知相愛自甘臨淸河薄譽緣斯得歌詠誰將和舜琴余旣離惡趣卽得善生受形於趙國爲張禹之子名勳旣長爲中正所推爲淸河令寛明自任人不忍欺待吏如僚友視民如家人吏有失謬者定正之弛慢者勉勵之鹵莽者教誨之貪饕者亷察之詭詐者詰難之不用誥詔者免去之惟曲法戕民以白爲黑事干人命者使自理之辭窮心盡然後付之於法若初情可憫者猶宥之失出之罰余所自當不敢辭焉民有爭財賄者以義平之爭禮法者以情喻之爲賊者使償其貲傷人者使庭拜其敵姦及殺人者付之於法其本心可恕者猶出之容惡之謗亦不敢辭焉以是一方之内雨暘以時蝗蠱不作偷賊相戒而出境姦邪革心而改行爲政五年怨懟不聞而民爲之歌曰吾有師師嚴而不慈教我恕我張君能之吾有友友信而不戒親我正我張君是賴我有親母恩掩於義張君似之柔而有制我有親兄實殷於情張君似之和而不爭後爲太守責以趨進余解組焉時乃章帝元和之末也第六十八幽明化盡心於道道斯行篤志求仁仁自成性定乃能通晝夜神全方可治幽明林宗獎拔存公議帝旨傳言無隱情三紀辛勤多懋績不妨陰隲相羣生余以先世善政有成根業滋茂天年甫盡卽遂受形於順帝永和間載生斯世所謂强孝仲者猶不忘於故稱也復爲郭有道之所品題雖不登顯代浮沉里閭而上帝有旨俾余日應世務夜治幽明凡人之屈伸寃枉陰德隱謀余皆知而籍之以至鬼靈邪祟無不預焉如此三紀幽明兼濟人鬼皆利余有功焉第六十九籌帷化襟懷有武且兼文一寸心田萬象分寶運將開司馬氏兵謀聊讚鄧將軍出奇間道行吾計盡瘁沙場佐帝勳史氏簡書還闕逸何妨籌畫世無聞余以善功世修漸復神職而命債未償者猶不吾置復生於河朔少負氣節眼見世變嘗以功名自期乃爲大將軍鄧艾見知辟請爲從事凡所舉謀余必預焉及伐蜀之年余爲行軍司馬勸艾以間道出奇以省鋒鏑之禍入蜀深境遇諸葛瞻許以封王琅邪瞻不之聽至於交綏瞻之中堅余所當也忽有流矢星飛集於余體瞻方就擒余欲營救之而瘡甚矣蓋向者卭池未償之報也可不戒哉第七十如意化帝手何年自執持玉京一旦賜於余指揮行陣陰兵出顧揖仇讐惡意移利器尋常爲伴者舊名時復自呼之從茲所向皆如意三界神靈誰敢欺余旣滿前緣詔詣玉京洗除業籍鼎新神位俾余永福坤維帝又以所執之杖賜余帝旨若曰咨爾孝仲萬靈之雄忠孝余節世資爾功賚汝斯杖無所不通又曰此如意也余以杖契宿名欣然受之第七十一丁未化越裳西畔金山色越嶲南邊近海涯醉眼醒看新日月間心猶愛舊烟霞元辰司命專丁未趙國中興顯故家火德佐王十萬祀始從今日拜眞嘉余以寶杖自隨無適不可因念前生西湖之隅復經從焉越裳之西越嶲之南兩越之間有金馬山勝境淸絕張老夫婦余累生之父母也於是生焉時晉武帝太康八年𡻕值丁未二月三日夜子刻以甲子考之則其時已屬辛亥日矣帝命以余爲丁未陽官本命元辰焉第七十二水漕化夢裏爲龍為帝王多生習氣未能忘笑他酒饌修淫祀書我官銜牒水鄉風雨聲中奔衞子桑麻陰下舞商羊職司全蜀幽明事七曲遷居道路長余巳長成妻男具而孝敬不衰見鄉人以旱祈雨於土木余笑之蓋余嘗以夢報矣一日水際自書官銜移文海神乃見使者吿余以有形而來自周爲人迄今顯化七十三矣乃呼余爲運判促上白驢風雨聲中頓失鄉地入大穴中宮庭明厰父母以下血肉皆在一夕雨澤大作徧全蜀之境尋有旨以余總護全蜀幽明之事焉第七十三桂籍化儒家桂籍隸天曹得失榮枯數莫逃夢契眞誠題義顯榜隨陰德姓名高封妻蔭子由寒裔曳紫腰金自白袍爲報雞牕無寐客勉心文行莫辭勞帝以余累世爲儒刻意墳典命余掌天曹桂籍凡士之鄉舉里選大比制科服色祿秩封贈奏予乃至二府進退皆隸焉第七十四孝亷化經術談王辨異同孝亷特地起遺風江甯玉璽皆天命日麗重光顯帝功馬化已知興晉室蛙尊誰爲屬劉聰跨驢直入西涼地遊戲隨機現六通余慕釋氏韜光禪寂建興中憫邊戎窺伺朝綱非命世英雄弗能反正會元帝建策南渡綏撫江左而白麟玉璽見於江甯臨安日有重輪皆中興之象予改日作儒士跨一白驢往河西應孝亷謁張軌焉第七十五感時化擬陪鄉士獻能書喜遇姚萇古亦無欲激頹波專號令敢攄忠節委均輸不堪狙詐爲三俊笑倚鴻圖應一呼興盡先期歸蜀地軺車枉駕訪君盧余建興末作儒士稱謝艾跨驢入西涼張軌以予爲主簿張重華嗣位時石季龍使將麻秋侵㓂不已涼州震動府司馬張耽言於重華曰議者舉將皆推宿舊且韓信穰苴皆非舊將盡明公之舉惟材可任主簿謝艾兼資文武委以專征伐之事庶幾可也重華召艾問以計策曰耿弇不以賊遺君父黃權願以萬人當㓂乞假臣數千人爲殿下吞之重華大悅以步騎三萬人令艾討之麻秋率大眾以禦之艾乘軺車冠白帢鳴鼓而行秋望而怒曰艾年少書生冠服如此輕我也命黑矟音槊龍驤三千馳擊左右大擾勸艾去艾不從下車踞胡牀指揮處分賊以爲伏兵發也懼不敢進秋軍乃退艾乘而擊之俘斬甚多秋乃匹馬宵遁季龍聞而嘆曰吾以偏師走九州今以九州之力困於重華眞所謂彼有人焉繼而往關中與姚萇爲友欲激頹波以正風化奈何縱暴之君競起廢弒然萇雖少而多謀略又况宿有契好故作密友久之余厭處凡世思歸蜀峰約萇曰苟富貴無相忘後萇以龍驤將軍使蜀至鳳山訪余余禮待之假以鐵如意祝之曰麾之可致兵萇疑余余爲之一麾旗幟蔽天戈盾戎馬萬餘列之平坡今試兵壩是也後萇以符堅死卽帝位國號秦焉第七十六神扶化淸河爲晉拯艱難堪笑符堅逞厥奸帝命神孫摧北敵祖爲賢相起東山濳機勝敗知前定報㨗音書謾往還試問八公諸草木史中功烈甚班班余父淸河府君念晉氏皆黃帝之裔其後陵遲欲降生於世而匡救之禀玉晉而生於謝氏於建興中故府君㩦余二子曰淵石曰懋陽遞生於諸謝余父高卧東山爲蒼生而起二子乃石也符堅拒權翼等諫率兵九十七萬東西萬里水陸齊進㓂邊孝武皇帝方將謀帥余父曰惟兄之子可當此任卽遣石及子琰等都督水軍七萬拒堅於夀春堅登城而望晉軍部陣其嚴望八公山上草木皆類人形顧謂符融曰此亦勍敵也後淝水𨚫陣大破之北軍皆懼桓沖在荆州遣援余父怡然不變止沖之師沖笑料其必敗及破賊書還無喜色人服其度量而勝負之數已素定於胸中嘻哉余之家世顯忠勤誠無愧於信史焉第七十七誅暴化禍福之機本在人只因現報與前因貪污賄利欺君命刻剝脂膏虐下民榷貨王仔生犢尾刷錢馬諤化豬身從茲警悟堪爲戒一念纔虧卽有神余仕晉之後兼治幽明時蜀之導江王仔者永和中任帥幕吏被檄督榷課鹽於潼川而王躬詣井所召民强與約率令倍差認課當取五千斤者輙取萬斤又約來年所輸不滿額者籍其家王心知其不能如約規欲沒入之使官自煎旣復命帥以鹽數倍增喜之余聞其苦民故陰治之是夕帥馮遷夢王仍來謁而公裳下有牛尾方驚悟有婢亦魘音掩及甦音蘇言適王仔者來公裳下有一牛尾出再四言其榷利貪污之故今生蜀之屬邑田遷家翼日遣人訪之果如所夢又益昌馬諤者同爲帥屬每出部邑督錢惟以多爲貴不問額重輕虛實嬴縮必得爲期且以此自負蜀人苦其虐號曰馬刷或以王君牛尾警之者馬曰正使見世尾生亦何必問余聞其暴虐如此聞之上帝繼而病卒七日之中其家作薦福聞棺中有聲意其再生亟開棺視之則巳變爲一猪矣急掩而葬之時天氣晴爽喪車纔起天雨如注送者皆不可行及墓次水已溢矣此可爲貪吏之戒第七十八明經化銅川蓍筮久濳心道學儒宗已陸沉天假仲淹重振鐸文追孔氏復鏗金儒風欲繫唐虞化大雅全排鄭衞音董氏庶幾顔氏子升堂窺見室之深余久處穹昊帝以中國道衰欲王化之復行故命余生銅川家知隋運將終吾道未濟退居河汾間修先王之業制禮以節情作樂以和俗恢刑政以防其非崇祭祀以介其福祖述周孔取則軻雄九年而成經也其餘五常之教於小子何述焉復以禮樂之學付之董常惜其不一用於太宗之朝悲夫第七十九護聖化漁陽鼙鼓扣長安此日明皇幸劍關若聽九齡攄諫論豈勞七曲重躋攀不因儒士爲親謁安得鑾輿復遠還萬里橋邊迎禁蹕音必誰知虛位紫霄間余自汾陽傅道厭於死生再奉帝命輔唐室故命長子淵石生於清河氏之家卽九齡也明皇時李林甫之譖毁肅宗而帝賴之以不易至於議論風生首登七寶山坐有文場戰帥之雄應制走丸之辯後漁陽之亂明皇幸蜀登劍嶺而觀中原歎曰吾聽九齡之言不至於此也余因至萬里橋以儒生謁帝帝曰鄉非北郭張生乎余曰然臣聞元載孔升天虛位久之以待陛下也帝默然後肅宗收復京都韋見素迎帝歸闕封余為左丞相而余密衛鑾輿至咸陽帝移大内安頤遂辟穀張皇后進櫻桃蔗漿等悉不食常玩一紫玉笛自吹數聲有雙鶴下徘徊於庭帝謂宮妾曰吾奉上帝命居元載孔昇天也令具湯沐復就寢而升化矣第八十明威化影響昭昭理可尋性天豈與物交侵眼根所着無非色身業居多莫匪淫四舉不沾天子祿一生虛負狀元心李登狂妄終除籍果報徒嗟罪障深唐李登者年十八爲鄉貢首自後凡十年一薦名愈下年幾五十不第一日齋沐詣葉靜法師具告曰登自十八𡻕叨冐鄉薦凡經四舉不登一第何罪至此幸法師入冥爲登勘當此生如何法師諾之曰蜀之梓橦有神曰北郭生掌文昌職貢舉司祿之官必能知之吾當爲汝扣之一日上章道過治所謁余法師曰士人李登者某年某月某日某時生凡四舉不登此人果何如余命一吏示籍對曰李登初生時賜玉印十八𡻕魁鄉薦十九作狀元三十三位至右相緣得舉後窺鄰女張燕娘事雖未諧而係其父張澄於獄以此罪展十年降第二甲二十八𡻕得舉後侵兄李豐屋基而奪之至形於訟以此又展十年降第三甲三十八𡻕得舉後長安邸中淫一良人婦鄭氏而成其夫白元之罪又展十年降第四甲四十八𡻕得舉後盗鄰居王驥家室女慶娘爲惡不悛已削去籍矣終身不第法師辭退以是語登登無以對一夕愧憾而死後之士夫可不戒哉第八十一濟順化綿綿唐祚欲傾摧叛逆陵遲䧟北臺逼脅乘輿臨草莽爭驅甲冑走塵埃天恩昭顯精神會帝室重興雨露來桔柏津前新應詔虬鋩誰信作良媒唐乾符中𡻕荒河南爲䧟者甚眾尙君長伏誅尙讓等推黃巢爲主反長驅江陵渡江爲患入淮北攻河南數十郡次䧟洛陽破潼關僖宗播遷入蜀巢犯闕遣朱温等攻鳳翔至潼關追僖宗乘輿夜遁出鳳翔余以儒服見帝帝夜行馬駭余以所乘騎奉帝帝乘之余捧足擁馬密布彩雲衛帝騰空彌明露雲微開令帝下視見鳳翔軍與巢軍戰於龍虎阪若蟻陣也帝曰此何所也余曰此乃空際帝驚歎曰卿非北郭生張孝友乎我非卿豈料此生耶余奉帝至劎南複道帝疲甚欲少憇命余股以枕之熟眠林葉風聲帝忽躍起曰巢軍至矣鼙鉦音征近也余曰非也乃林葉風聲久之從駕宿衞始及訝帝行之速也帝至桔栢津約曰我有一女乃興唐公主最神慧奉卿箕帚可乎余曰臣幽也何敢奉承帝曰勿固辭也遂封吾濟順王親至廟奠獻解劎為賜仗余勦賊後宋文通等斬巢首送成都帝還闕則興唐公主從而殂矣余命陰兵迎公主歸七曲焉第八十二濟迷化救世乖訛物理衰神人淆混化塵微庸愚指我爲妖妄䝉昧嗟余擬是非匝地亂雲多雨潦亘天烈熖示光輝孫樵始信英靈著從此寰中顯福威五季中進士孫樵者性尙剛介不與羣居𧦄斥佛老著無鬼論自隴之蜀過祠下侮辱無禮而去扺於山陰天忽昏晦風雨如撒行者不可進欲投邸而不可得遂呼曰此乃北郭生張君如果有靈則指涯涘如何余命佐神舉火一二示之樵尙笑曰廟奴誑我再呼曰神旣在何不爲我止風雨使我能抵於平陸如何余笑曰子所過神廟必狎侮指以爲妖笑以爲誣今悔之何及也余示之以炬火數百山川明朗可容行李須臾風雨頓止翼日留記於廟焉第八十三證果化色空歸性湛然明樂道全眞顯妙因拯溺大施康濟力活人廣布惠慈仁三千果證如來號八百功成大士眞不動戲遊三昧地坤維重顯福生民余從釋地頓超不二法門居淸涼寶山仍司民疾苦時蜀人苦於湍流自遂城至涪江水溢抵於城隍人多漂蕩又苦疫癘痼瘵音漬癰疽之疾余化里神爲作篙師拯合溺者凡數千人又化太醫生親爲診候全活者眾會鷲峰古佛紀功錄行爲余授記作是言汝於當世作佛號安樂不動地遊戲三昧定慧王菩薩釋迦梵鎭如來今證斯果焉第八十四明良化藝祖開基妙若神義欽遜德不勞兵終南翊聖會全璧汾晉西祠巳結纓十策條陳裨獻納兩朝爕理致昇平明良慶會應非偶炳炳丹靑顯令名余方居不動地精修妙行而八紘音橫雲擾世變輪迴適奉玉音五星聚奎有興宋之語徧勅諸靈出以應運故翊聖降於終南張守眞之廬及晉祠有崇德之聘余遣次子曰懋陽生於淸河曰齊賢布衣十策厯相兩朝佐神獨孤生於㓂氏曰平仲力輔章聖策功澶音蟬淵基二百載太平之治焉事載國史所驗不誣第八十五忠顯化聖明天子出乘乾孽黨何能撼蜀權均倡悖徒淩郡縣順連叛㓂汗山川不煩兵刃交鋒戰立見王師奏凱旋知道劍關神有力徽章溢美備人天余方以海宇淸甯爲喜而湻化年間均順僭叛王師討之主帥王繼恩雷有終祝吾丐靈余命崔瑄李懋以陰兵助雷有終擒賊至利州賊固壘不下一卒於軍中呼曰梓橦帝君遣二將助陰兵百千今奉天勑勦汝可速降而賊以勁弩一箭中呼者履其卒去箭無恙又厲聲自若預言賊䧟之期及叛平有恩榮以英顯之號上帝嘉余弭變能免殺戮俾專輪迴救苦之司開便宜都督之府總三界六天之陰兵第八十六聖治化太平風化樂唐虞致治馨香等太初率服四夷明德教奠安百姓法規模挈裘提領知賢相錯節盤根見大儒子舍輔成元祐政著書誰用鑑寰區皇朝一祖四宗垂拱太平余奉玉旨以長子然明生於司馬氏家名光盡誠於舘著古今厯代史以鑑於世輔宣仁聖烈皇后擁少主不出簾帷而天下治當時庶政聿修咸謂德合天地道通神明而積仁累德澟澟乎庶幾周召之列焉第八十七武烈化猱猾交馳㓂隴西秦梁幾陷孰排擠高宗側席方求策諸子宣靈已挽輗木馬汗流知助順朱幡火烈示端倪兩兼吳蜀回天統皇夀重延日月齊余以朝廷承光大之休命尊峻極之崇階地廣三代威振八紘忽女眞有燕山之圍方賊起江湖之釁三辰錯亂師旅並興女眞無厭竊我神器二聖北狩百姓流離於是相聚雈音完苻蝟毛而起攻城剽邑流血成川炊者不及析骸食者不遑易子億兆空懷主之念九牧大勤王之師猱音牢猾狼貪未已再興西北之師逼於秦梁幾陷王師乞靈於祠然余已應化淸河氏之家久矣余之五子長曰淵石卽竟也次曰懋陽卽贄也三曰竇曰貫曰質統佐神崔瑄李懋等奉上帝命憫其一方勅令助國卽以神兵現滿山川金人驚駭而遁木馬有汗流之珠隴西獲晏安之福以迄於今焉第八十八興國化朝廷中否甚傷情事業班班可訪尋政在平江扶大寶兵虧陜右本天心便宜坐使兩蜀靜陞陟恩流三峽深要識此回神異處柩中全體土無侵余以仙釋交修不欲出生死地而靖康有陽九之厄帝有恩言命余靖難乃於紹聖丁丑託化張浚立一世之英表平江復辟聖天子垂統四十餘載至富平之敗非浚之失乃天也隆興甲申浚死葬於衡陽子栻杓欲更葬於蜀旣啟棺視之威容儼然如存合郡士夫觀者如堵以手加額者眾隨而掩之倘非余神化安有此也余生領天子之權於蜀殁掌文昌之命於天其功績不忝矣第八十九止足化玉册襃揚賜寵光尊隆師傅總元綱積功惟喜修天爵被命甯辭抗帝章蒞事惟勤居太極貢賢是任主文昌錫民五福期康乂非特區區一雨暘余隆興之𡻕奉玉音加秩若曰文昌者教化之本原實傳列聖之業儒士者道德之淵藪宜推一德之忠播吿諸天亶孚有眾惟文昌司祿主者職貢舉眞君衞民少傅靈應帝君張某德被萬物威形四方粤自有生顯從浩劫順考古道鑒觀人文照臨並日月之明發生贊乾坤之化是以教耕稼而民人育每裁制而自優修禮樂而政事康果猷爲之不謬干戈載戢陰陽常和水土旣平休祥時格託之庶務試之諸艱皆濟濟以可觀每多多而益辦昔自水漕今蒞台衡尙持拔苦之心誓拯倒懸之厄厥有成績巍乎難名察乎九十餘化之行藏命編諸册著以萬二千端之行節豈曰空文顚則持而危則扶惡以懲而善以勸下民允賴惟乃之休况復恢龍漢之圖書闡鸞臺之典則欲分身而顯化率諸聖以混融萬範開張三界均利宜加峻位俯叶輿情名躋南極之尊禮絕星聯之上於戲躋三階而下太乙允彰應物之符歛五福而錫庶民式賴師言之佐誰其能者汝往欽哉可特加金闕昊天太師紏察三界禍福之事余辭表略曰滿盈之懼上瀆瑩聰温厚之辭時紆訓誥意敢懷於不敏欲猶冀於必從申謝伏念臣德薄位尊言輕行寡徒以效誠之決未懷引退之私茲遇盛時重叨異數豈不侈高上之賜其亦畏至窮之災恭維天尊上帝道善貸以亶成明容光而必照護以小疵之失察其由中之言方將曲致於施仁夫亦何嫌於遷令余再三辭遜而受之兼司四方禍福所以分身應化焉第九十眞元化物有濳通信可知幾回利濟惹閒非觀風隴蜀存眞寂掌籍南昌應事機金闕錦囊宏帝道紫陽玉籙振霄暉更生爲顯昌黎事別有精言示福威余自興國之後遊神附鸞宏顯籙法幸遇聖朝仁化神眞降靈故三神所授大洞經籙法三宗復傳於世昔賀達授姚偉而仕至大夫朱道元授朱渙而官至淸近劉若拙授周良輔而高中科甲黃若水授蘇軾而爲兩制文臣劉浩然授虞允文而爲中興宰相是皆範文儒昌道命可不侈其傳乎乃演是籙於寶屏之鸞而降淸河内傳併委劉安勝與其子當程允洽及其兄兼善計府何敦信衛丹李茂等設壇於誠應樓發揚七十三化之本始以待智者而涪之樂温龍門韓申之者乃宿契也其孫坤臣病篤叩余甚力卽授以符藥復遣治病功曹應感更生仍𢌿法籙今涪夔之間靈應昭昭眞元驗焉第九十一誅逆化密承帝旨下蒼旻昭示塵寰禍福因爕理璣衡明察訪斡音莞旋綱紀妙經綸王生易木雷誅魄徐子貪金命殞身羅鞏未還先告卒只因不早葬雙親余被命遷師相之職專生殺之柄司禍福之事採訪善惡乾道中蜀之中江王千者其父母自買香木棺以備身後千易以杉木已而貨之再易以株板及母亡則留株板自用但市松棺歛葬余察知之將王千以雷擊死倒植其屍其子哭而扶屍仆地日正中雷震挈其子於五里外洎後回見父屍依前倒植凡兩瘵示土皆然遂於棺上斵一竅以竹標之方免震出同時新都丞徐謙者被檄充勘官宿犍爲境上徐氏家主人前一夕夢神人謂曰明日有徐侍郎宿汝家宜善待之神人乃吾所遣佐神也至晚果有徐從政踵門遂具盛禮及回復夢曰徐子此回受五百金枉七十人命天曹已減三十年夀官止此矣徐氏乃不禮之丞訝問其故語以夢中所報丞愧形於色回任改秩未及拜命卒於邸中年三十四聞者莫不惜之又梓潼縣羅鞏者入上庠過祠下默禱於余余夢告之曰子已獲罪於天曹宜亟還鄉前程事無復問也鞏懇曰平生操履俱無過失願聞罪由余曰子無他惟父母久不葬爾鞏曰家有兄弟何獨歸罪於鞏乎余曰以子習禮義爲儒者故任其咎其餘碌碌不足責也鞏旣寤悔恨治裝還鄉同舍驚問鞏以夢告未及家而卒焉第九十二㧞苦化漠漠幽都未有涯今來古往幾遺骸皇穹有命司藏瘵示土神化無方廣葬埋玉厯紀功頒玉册瑤華錫命步瑤堦逍遙金闕宏慈憫一視同仁無等差古史曰枯骨不知年數尙感文王之葬童子結伍以衛魯國猶存孔子之謨今天下多遺骸暴露甚至有父母而不知葬略無惻隱之心况於他人乎余遊神察訪深爲惕然適奉玉勅俾司焉余力爲開誘凡暴露而得埋葬者甚眾功聞於上時上天開化十九年下世大宋中元甲子紹熙六年正月初一日三淸至尊在玉淸聖境九霄梵炁之上大會九天十極考校功過無上至尊金闕昊天玉皇上帝總領三界羣眞諸天列曜地水眾聖上朝三淸爾時元始天尊登命金闕侍中九天司馬儲福定命眞君開碧玉寶笈流霞丹匣出萬天素威功過玉厯考校諸天諸地水界陽曹昇眞得道以來功過大小以余自龍漢初劫化九光之始育黃之秀神一挺生已三千餘化迄於周武王之乙已𡻕乃符火德降生於淸河氏九十餘世之盡孝盡忠百千萬化之積功累行當次天帝之位於是諸天行舉三界推尊頒降玉厯下示金闕乃命玉宸左侍瑤華内院翰林瓊章學士諸天眞君撰製玉册以是月十五日進封帝號曰無上大羅天開化十九年正月十五日金闕玉宸瑤華内院三天門下都省一炁分形化生四靈天道無形無名始靑肇判挺生聖眞乾坤並德日月並明天上天下莫不孝欽唯昊天金闕太師紏察三界三教禍福事九天都督大使判桂祿嗣籍上仙元皇眞人張某黃孕質炳靈張翼之精梵炁通靈妙證虛皇之果植立古今之名教彌綸天地之璇綱全十華十德之太朗八景八眞之妙善分身應化不外乎忠孝之兩端救劫度人必本乎慈仁之一念九十生之功成行滿三千劫之道備德高坤維宏福惠之恩乾造賴贊襄之力善盈玉厯名渙瑤穹當位帝眞式隆寵號謹遣金闕侍中玉宸左侍淸學士無上上德眞君甯洪齎捧金書玉册特上尊號進拜南極長生眞王九天定元保生扶教開化主宰波羅尼密不驕樂育天帝救劫大慈悲更生永命天尊上極先天地道藴黃生一炁以化三才混合空洞證十通而成萬行離相消塵扶教定元下制延康之浩劫保生行化俾超暉景之太霞位峻九天職隆三界丕闡慈悲之行大恢生化之原持檀熾音領蒼胡寶功高莫議德盛難踰合示嘉尊幸毋謙遜仍冀同符大道劫劫長存普福生民巍巍其大龍章昭錫永祕都謹言於是余以是日受徽號於玉宸金闕七寶瓊臺之上昊天至尊御殿典儀賜羽葆霓旌九龍玉輦九鳳瓊輿冠通天十二旒之冠服衮日月山龍華蟲之服圭朱履所居之宫一曰紫微垣文昌宮在赤明和陽虛明堂曜天之間一曰玉霄綘宮在波羅密不驕樂育天之上宮闕巍峩皆大暉華炁明揚龍光赤城丹臺金墉玉樹靈風自鳴紫雲常護余欽奉册命峻遷天眞愈懷恐懼乃作慈憫而自誓曰下土眾生不知因果不識罪福多迷正道多入邪宗展轉沉淪無由出離又值延康末劫魔鬼流行人民受禍剝爛生根誠可哀念乃以孔孟伊周之學道德仁義之教綜以仙釋之靈通顯以桂籍之功用設爲四科立爲九等表吉凶悔吝之機彰善惡禍福之報或兆於夢或著於籖分身應化救劫保生嗣是之後文武醫卜士農工賈凡一民一物之枯榮貴賤皆隸余之造化焉第九十三福瀘化煙橫瀘水碧漣漪殺業誰知會遇時山寺劊身徒憤憤岳靈阻報且遲遲儻存忠厚佛三昧不致仇連李萬兒張信復歸王吉手彼冤此報罔踰期紹熙中瀘帥張孝芳者爲卒伍張信等所謀而致叛信爲同伍張昌殺之瀘遂平定此乃紹聖中秭歸一僧俗姓廖名慧覺居山院蓄貲甚厚醵錢作斷瘟水陸繼而草㓂李萬兒者率眾欲劫之初不知其僧設穽於四垣遂盡䧟之惟李萬兒數人僧與其徒劊而食之後李萬兒等圖報其𡨚岳靈曰汝報之未可此人有爲眾作福之緣未艾更一生可也惟汝尙有所殺王吉必報汝也自是僧慧覺生淸河家卽芳也萬兒卽張信也吉卽張昌也其報昭然余遂與英烈統理神衛瀘而平焉第九十四昭明化昔從太極肇羲皇神性隨機雲水鄉九十四回彰變化三千餘行露微茫雙峰爲建初宅七曲周遊參宿方聊附飛鸞明此意出書重訓藉揄揚余以天命薦隆位登金闕逍遙紫虛遊神察訪而世變愈降偷薄鄙詐之風在在皆然况劫難將興未易消弭乃寓鸞顯化少變汙風小回大劫如昌之龍因普之萬松雅之百丈遂甯之蓬谿皆勑余分遣仙曹爲應化之壇故在蓬谿則解序玉經在萬松則書降寵號又巴陵運騰里人楊思作文昌星席以朱章感諸眞具集余拉崇應遊神降福因覽雙峰眞神仙窟宅遂請於帝立昭明應化鸞臺以示四民休徵仍爲余父初大帝化建寓室而韓震巽亦樂施田焉飛鸞開化於斯爲盛凡有見有聞者莫不知也第九十五亨屯化五劫將終三卯興妖氛只恁慘參辰開禧方弭包羞否紹定重基構難屯謾向吳山尋活計不堪錦水已胡塵天顔未允寛分奏此際應知有大鈞延康禾劫蜀有三卯之屯開禧丁卯逆曦僭扆余不忍生靈荼毒預稟天勑遣皛音杳然山神降生爲安丙同崇應帝削平此亂故余垂鸞示以安丙二字是以楊李諸人得以成事而禍不及民紹定辛卯蜀變甚慘皆人心不古有以召之余屢請玉陛天怒震動不允奏聞乃遣鳳凰土地生於余氏曰玠尹正西陲以甦蜀困時號小康皆余救劫之功迨至乙卯世事日非奈數不可挽主宰無功雷杼不可以復居矣遂有三潮之命悲夫第九十六安南化六丁五未數相仍井絡參墟總弗庭雷杼不靈踰一紀鰲山分化恰周星瀘川復正車書舊巴峽重羞黍稷馨天道惡盈應未泰江南生聚苟安甯余由周迄今炳靈劍嶺邇自三卯雷杼不靈星周一紀月寓千江雖無地可居幸有天可依親奉玉旨暫宅鰲山而六丁五未之數難逭蜀之諸郡俱有變遷是以巴蓬利閬莫不北首余與崇應昭惠奏移整於瀘以全蜀本渝嘉以下苟活生根皆余三神之力也第九十七復古化摩圍勝地聳金蓮眞宅甯親顯後天胊音渠水規恢修禮典鵞灘助順洗腥羶大開復古康民化誓作分身救劫仙一十七書堪範世飛鸞演化示眞詮余三潮宅眞之地數罹劫變再奉天勑移鸞於黔遂以雲龍山摩圍之後洞爲甯親之宅以駐神蹕分遣仙官隨地炳靈爲國宣勞不一而足趙定應以功業著夏貴以如意顯如開州之復鵝灘之捷皆余陰相也又命曹光顔奕李白蘇軾黃庭堅諸仙假金蓮石葛傍巖鑽火鎔雪烹茶著經述儀開復古大化出一十七書以夀衣冠之脈以植綱常之教以昌文儒之命以衍上帝一十七光之休而永億萬世之眞傳焉
