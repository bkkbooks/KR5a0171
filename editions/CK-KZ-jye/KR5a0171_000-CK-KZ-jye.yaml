body:
  text: 文帝化書事跡原序化有二理有變化之化有教化之化自無入有自昔爲今以幼壯爲老死以老死爲嬰稚此變化之化也三綱五常是非邪正上以風動其下下以獻替其上此教化之化也元命者序太始也流形者本太質也生民者明性習也易俗者變夷禮也稽古者覺後知也奉眞者遵道法也甯親者報劬勞也幽婚者戒苟合也淵石者重有子也馴雉者誠感通也回流者䕶先塋也降瘟者顯符驗也好生者習醫業也天官者醫業成也薦賢者公道開也格非者和聖賢也榮歸者知止足也敦宗者念本支也歸寂者遇釋法也君山者喜幽淸也感生者不能忘情也奉先者思繼志也孝友者繼絕緒也沔水者杜讒慝也白駒者冀留賢也舉讐者忘私憾也恤孤者敦孝一作友義也慈訓者傳内觀也盡忠者堅臣節也棲眞者届雪山也山王者始䕶蜀也刑賞者罰淫而舉孝也存褒者沮西嶽之擅威憫無辜之陸沉也回風者嘉孝子而罪狂夫也明𡨚者嫉無名而恤無吿也苴邑者滋生齒也拯溺者善賢侯也雨穀者惡利一作私心也曲雨者惠遺黎也殞賊者旌孝婦也北郭者誨求嗣也返火者匿奸計也平苴者現陰祐也費丁者賤勇力也石牛者惡好貨也五婦者諫重色也顯靈者不忍蜀之亡也大丹者遇聖師也巴都者嫉贓汚也婆娑者明天性也戒龍者和鄰袛也鳳山者尊所生也魚腹者矜老苦也口業者彰惡報也東郭者懲巧僞也牛山者分善惡也天威者憎逆婦也尙義者貴同氣也旌隱者厚士風也佑正者高烈女也殺生者遠庖廚也酷虐者戒偏性而害物也閔世者念黎元而將救其亂不忍無功於物而叨受血食也咸陽者明靜心妄動則招尤也卭池者爲所親報怨也解脫者謂𡨚不可成而非大聖則莫能解也仁政者悟前非而積後果也幽明者俾世知暗室之不可欺也籌帷者償宿債也如意者大有爲也丁未者兆命於當年而佐聖於今日也水漕者司天澤也桂籍者喜文儒而尙德行定優劣而司予奪也若夫應舉孝廉結交姚萇顯八公之績開中興之運與其李唐二帝入蜀之符驗我宋累葉報功之祀典則有内傳行事與夫名卿翠琰大手綸言在焉非此顯化之屬也侍生劉安勝與其子當程允洽並族兄兼善四人者事吾之久緣法相契邇緣篤於事神而有七十三化之疑嘗請於吾因命四子設壇於誠應樓諸生執鸞相事更代其勞於此發揚闡露以待知者仍令計府何敦信衞丹李茂等董其事及繪畫刋本傳諸當世嘗謂幽明異塗理致則一在洪荒無爲之世則鬼不能千神而神不能干人於樸㪚多事之際則人僞滋廣非天不足以勝之是故聖人神道設教始有天人相因人神共理之化要其所歸不過垂世立教之大端也雖然法立而姦生眞去而僞起碔砆或可以亂玉稂莠或至於敗禾假神爲言誣天欺俗者亦有之是則付之於清議又不足與辨也時淳熙重光赤奮若至曰寶屏山序續降化書事跡原序夫陰陽不測天地之化也以道設教聖人之化也合乾道之變而藏其用因聖人之教以寓其跡者其惟神乎以大而言之麗乎天者非止曰月也有星辰焉有璇璣焉而又鼓之以雷霆潤之以風雨此所以不言而行四時麗乎地者豈特草木也有邱陵焉有河海焉而又敘九疇分六氣此所以不言而生萬物至於聖人開物成務法天地不言之化運至誠贊育之妙自微而潛乎心至大而行之天下則神之爲用存乎其中矣惟聖人窮而知之百姓用而不知者七曲帝君應化淸河游神濁世觀其爲神爲龍自水府而爲天官由王者而爲帝座或爲忠臣孝子義士廉能出幽入明懲惡勸善大率皆以仁慈方便正直含容輔天地不足以化扶古今欲墜之教有所謂大無不包細無不括者曩寶峰所降之化止於七十三事畧而未詳其自國初至今民賴其庇其跡不可不書了菴居士楊興乃英顯曏之門人董常也運會符契來貳古通遂拉中和道人溤如意炷香扶鸞叩神於是復降行事之微茫續爲九十七化余忝聯天府請序其目七十四一作二孝廉者經濟太平之基也感時者悼中國王化不行結信義於交遊也神扶者淝水大㨗而八公山草木化人形以破苻堅也誅暴者戒污吏貪暴示以異類報也明經者彰禮樂顯先聖之道也䕶聖者命子顯於曲江而扈禁蹕於萬里橋也明威者戒士大夫不欺而守正則功名可必也濟順者奉僖宗以保民也濟迷者顯火炬以懲不信也證果者悟眞宗也明良者慶會遇也忠顯者佐皇國伐叛逆而盡忠節也聖治者庶事修而歌太平也武烈者濟時康難也興國者忠良也止足者辭玉府尊隆渙號也眞元者拯難也誅逆者誅不孝以明天令也拔苦者悼亡也福瀘者平宿𡨚也昭明者見畢工也亨屯者削僭也安南者活生也復古者夀文脈也此書非了菴則固未顯也蓋天人相因不期而然抑有以表而出之觀者宜加敬焉紹熙閼逢攝提格中秋日英武昭惠靈顯威濟忠贊王崇應大帝李序
