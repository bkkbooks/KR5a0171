body:
  text: 戒龍第五十一周既為秦九鼎遷諸龍聽命海神前輒因爭道宣餘忿不顧殃民有重愆指石為盟心可信仰天設誓語無偏從兹岸滸耕桑者無復橫流浸漬年青衣之水自西而東與岷江相會秦既并周九鼎西遷諸山之祇會于嶽靈諸川之龍朝于海若所以聽革命而效靈祉也二龍俱東相值于江合之中流爭先以行氣不相下鬥於江淵二水俱壅波濤橫湧民居其滸者千有餘家一日浸漬奔避無及怨苦之聲達于四境豫適見之先遣陰兵萬衆障其狂波豫造水中解紛謂之曰維新之命易我舊德餘忿不忘百靈皆然何獨二君今以爭道而鬥禍及居人向非吾兵障流則此邑之民靡有孑遺矣且上帝好生後悔何及二龍曰敬受教令既遣俱行且約歸而成之及朝宗回日豫與之尸事仰天設誓指東西二大石叱之使起須臾兩石峙而立豫復戒之曰二江之龍言歸于好天地為質斯言不渝若二石而為一則今日之盟可寒決别而退鳳山第五十二千重肌肉受胞胎十月懷耽豈易哉情實片言違主意羈棲兩紀受身災不因夢裏騰魂出爭得山邊避雨來子母如初天理在晚年甘旨且相陪果山之隅富人王基五旬無子一日醉飽形言睨其妻曰人之欲冨者生有衣食之養死有祭祀之歸也今冨而無子安用富為哉妻安氏亦巨室也生平不字性嚴而妬聞以自愧乃出粧資買柳氏女以奉良人逾年有娠安喜甚旦夜焚香祝于天地每以王氏嗣續為請知柳有娠即以己之衣飾與之至於防護飲食寢處無不經意臨蓐之月前期擇女醫以為備既分免果得男子大喜兒之乳哺襁褓大小便利皆自洗濯視其子猶己生也夫君賢之子百晬名曰宜壽亦安之意也尋别召乳婦專飼養之或語柳曰吾與汝主客也汝至吾家飲食受用與吾無異蓋以吾兒之故爾兒將周晬矣吾將擇媒嫁汝為良人妻也柳乃號泣曰非所願也願與宜壽相處死而後已安不悅曰汝欲與我為代耶尋撻之即易其衣裝食以粗糲視之如犬豕呼則以畜名之力則辛苦畢責於柳宜壽三歲一日走投柳懷相向而泣柳曰我以兒故飢寒苦力無所恨也邇來月餘不見兒面兒憶母否宜壽亦哭之聲聞于外安往視之奪兒出持挺箠之甚苦時當寒月盡褫其衣夜屏之外詰早呼里胥而逐之基以重傷宜壽之心勸留之安曰我與此畜勢不俱存今欲以此畜為妻則我且出必欲留我則無容此畜儻移時而不決則我且求死於君前基不能拒與柳所服裙叉俾携而為資安氏奪之柳以久於飢困憔悴骨立鬢髮童秃身肉枯黑人無取焉乃行於城郭窘食自養適王之族有徙居通川者挈柳偕行年餘安知之貽書詬責又被逐焉既無所向乃以薪水力作糊口於人厥後兩周星紀宜壽父母皆死己亦有子十歲名知微或告其妻康氏曰我家生理頗豐諸無不足惟我所生不知存殁日夜愁苦我今三十而已華髮伊此故也即以家務委其妻曰善視吾子我將訪母見而後歸乃出而北行凡遇井邑觸處徘徊淹留道塗俄爾經歲宜壽每出行路哀哭摧毁日惟一飯菜米而已誠動幽明所至祇靈為之感格巴梁二江相合之地有鳳凰山豫徜徉焉見一老嫗負薪行烈日中揮汗不已憩於松下南向長號曰宜壽宜壽吾兒健否母困極於此兒安得而念之豫聞之有所不忍呼里域獨孤正而詢之正曰是王宜壽之所生母也時宜壽久外其家促歸已返中塗豫為夢之宜壽自見所生在家之日苦樂之詳及路中相見之處明日大喜曰神明告我子母相見有兆矣乃復北首所經山川道里皆夢中境也行三日到鳳山之下方炊暴雨忽至行人莫進良久一村婦負薪而入見宜壽揖之宜壽心動詢之乃其母也迎而歸之柳年八十而卒魚腹第五十三生身為女已卑微況被狂夫掠賣之飲泣父親成瞽廢積憂母氏似迷癡異鄉苦樂誠難測一命存亡不可知直待咎元彰報應臨終方悔得便宜蜀土之生民二男四女故其俗以女為卑涪水之源富民任盈年老無嗣惟一女愛之名寶珠年十五隨鄰伴遨遊蠶市燈下稠人中迷路為惡少咱元誘之父母重賞尋訪月餘已為元所賣於夔子矣父哭之失明母義氏心氣成健忘如此十年百計求之了無音耗盈聞七曲之靈乃肘行膝步號泣見投願一見珠而死豫閔之乃敕八功曹將三百陰兵方圓千里四外求之或見珠於夔之魚腹負汲而哀詢之瀼龍乃得其實豫乃夜夢於盈自七曲而南沿流下之直抵夔門見女與語女亦夢見其父既明盈謝而去使人相之蓋如夢中所行乃見焉珠初為人婢主母惡之而箠撻過甚又轉他家前主倍取其傭又三年復為鄰子詐欺曰爾父求汝令我與汝來又轉之他家如此前後四主矣珠今在張白家主母忌人有孕而珠實懷之恐得罪欲赴於江而如有人難之父聞珠聲音目乃有見俱詣其主贖身以歸母亦疾愈咱元者老矣豫乃遣功曹監治之日撻三百凡月餘抉其兩目乞丐於市自陳曰寶珠之失身元之罪也今為七曲張主治我良苦且死矣逾年而殂口業第五十四人生口業報非輕莫把邪言作課程妄語以虛為實事綺辭增百作千名血隨砭石流無已罪積陰司貫已盈犁舌不須求地獄眼前公案甚分明龜城之民祝期生有口才而習下人有生相不具者譏笑之妍美者亦疵毁之愚昧者輕侮之智能者亦評品之貧者鄙薄之冨者亦訕謗之官僚則播其陰私士友則發其隱曲至有門地才具出己之右無可議論者則曰乃祖微人也乃父鄙人也或曰其母家工商也其妻家駔儈也或日厥弟不良也厥子不肖也凡所知識皆不逃於貶刺之中此猶細故也人小有過惡則既傳揚之又增飾之以無為有以一為十以疑似為端的以偶然為故犯以不得已為優為以錯誤為情實至於面折之衆辱之又從而告訐之非特待他人如此雖已之族黨亦不免焉目其父母為頑嚚目其兄弟為管蔡非止於身為之也或教人興訟己則解釋之或教人詛罵己則辨證之所習既久不知其非中年得舌黃之疾使人砭刺出血勢少間不數日又作尋復治之大約一歲之間疾五七作每作不下出血一二升率以為常一日因與其徒話鬼神幽明之故言天之雨陽之不時地之豐歉之不一鬼神之受人祭祀祖禰之邀人奠酹皆訶罵之豫適與江瀆會語聞其多口豫方竊笑之里域真官虞奇叔曰此特萬分之一耳因備舉而詳言之豫乃遣功曹謬其操持使自以手探舌出以爪犁之涎血淋漓如屠狗彘流溢於地觀者千百使自宣其過曰人之口業不可作也如此月餘舌枯不能食而死東郭第五十五工作雖然為得財也須擇術自量裁減輕添重由心造提後推前以意猜業熟雙眸皆瞽廢藝精五指盡傷摧三年陽責人為鑒寧免鞭魂死後災蜀郡土薄水淺民生其間率皆慧黠有智數多機變巧於求利闤闠之徒雖一錢物皆有贋偽東郭人黎永正本攻輪輿猒其作重而貨遲乃改業治斗甬尋又治權衡逾年人有欲深斗重稱為囑者倍取其直而與之其欲減勺為升減合為斗省銖為兩省兩為斤者亦如之永正又能作空中捩絲之稱折底隆梁之斗小民不顧報應者以為便於日用往往求之一日司察神紏奏有旨以為用之者固非而作之者尤甚俾所在神祇陽警而陰理之豫乃遣里域神段彥夢撻永正雖悟未悔既以聲名漸彰求者愈衆貪其工直夜以繼日使其目力昏暗以致矇瞽年方四十妻棄而他之二子生而亦盲又以久業於此不欲頓廢既已失明别無生理乃至以手為目揣摩廣狹臆度長短鋸斧釘鑽冒險施用左手五指朝傷暮殘膿血甫乾肌膚未平尋復被苦指節零落不能執持行哭於市人既識之皆無所恤飢寒切體如此三年使自暴白其過而死二子相繼以殍由是所用之者因少戢焉牛山第五十六積善須逢善果圓惡人還值惡因緣公平苟信無凶報慘刻蘇珍惹禍愆但種稻粱先滿地莫憂荆棘後參天諸君試看簷頭水滴滴相承不肯偏蜀郡涪郪二水相會旁有牛山山之阿井邑繁衍邑之吏苟信蘇珍所居比鄰而每事相反信以公恕珍以深刻信以廉節珍以貪墨信以倜儻珍以陰謀信以推誠無隱珍以匿怨深中信以語言必信而不輕諾珍以脅肩諂笑而無情實信奉母以孝而教子以嚴珍待父不敬而縱妻犯上信少求而儉用珍奢費而無餘信和同上下而無怨言珍以己律人而少許與信掩人之過而省言珍發人之私而多口鄉里公私皆以信為賢以珍為鄙且忌珍之敢為而不能與之較歲終邑人大集會酒間鄉老周同舉手示衆曰秦有二水曰渭曰涇一濁一清皆赴于河發源既殊波蕩不反三尺童子見水之色皆能以涇渭名之蓋以清濁取之也在人亦然方語未畢珍乃面頸俱赤投袂而起曰苟君是渭珍是涇矣珍與苟信聯事而切鄰珍之所為惟信熟知今信播揚珍惡使鄉老於廣衆中以水比喻珍將報信以明心信實未嘗以告人也自爾珍每見信必眥睚之雖禮文相接而中實仇敵也又嘗教其子明能伺苟之子儀真之便且將殺之次年春祈蠶行樂明能與儀真並行江際且語且笑明能有惡心而儀真未悟也乃恃力推墮儀真水中儀真急挽其衣與之俱墜出沒於浪花間豫與諸龍君皆預供神之席因敕二江龍拯之郪涪二君雅知二子之詳乃携儀真近岸而轉明能于淵會珍見之褰裳而往復取儀真擠焉旋為儀真牽挽而入觀者如堵呼哭騰沸豫不平之乃使郪龍曳珍之足沉焉儀真得無恙珍之父子皆溺萬人兩兩相謂曰孰謂龍天八部有私乎信與珍禍福不在於此日也蓋信之善果己熟而珍之惡業方盈焉天威第五十七婦人植性固多偏孝養勤誠豈易全宿業雖應雷斧禍今身幸有事親緣亘天虐焰俄回息捲地威風急變遷馬氏焚尸支氏免乃知輿議合於天郪邑民支祖宜其妻喻氏年二十五有姑黃氏八十病目無所見性褊急喜潔難事而喻以少年勤廉恭順能逢迎之三年無間言其夫因酒誤人仆墮兩齒求免刑責入財自贖以喻隨資入之喻無悔一夕夢里域追逮責曰汝前生為比鄰牟容之妻年三十病殗殜逾年汝之姑七十餘煮糜供汝汝以口苦猒食嫌其太頻哭而叱之者數四及臨死之前一日對姑呼天曰年七十者不死我方三十而使之死天不平乎汝家司命聞之于天帝有旨令焚汝尸而汝氣已絶事未之行案牘仍在凡三十年為一世今當結絶汝宿業所應者死於雷斧之下來日俟之以汝今生且孝故先期告汝喻驚而寤中夜坐而號泣良人有家幹出外未歸姑曰汝以吾子破汝家資謂終身不可償耶喻曰無之凌晨沐浴新衣拜其姑曰新婦三年事姑無狀今請假暫歸恐不測身死不復來歸婆好將息姑訝其言不倫歸别其父母所言如初自炷香立於屋南大木之下仰天而祝曰新婦之死宿業當爾有所不辭重念夫貧姑老晚年失婦誰為供事一也父母自少小教訓今被天誅為父母之辱二也身有孕已七月矣萬一得男支氏有後三也今二事皆不可避獨支氏無後爾乞少延三月分免而死時大暑中陰雲晝昏風雷交至里域為豫言之豫知其心乃為奏之有旨取里中凶逆者代之冨人張實妻馬氏淫悍悖逆事姑嫜無禮制其夫如奴隸豫即遣里域同雷火神治之俄喻氏無恙而實之妻焚焉尚義第五十八昆義由來一父生至親安可便無情李華待蔚真堪尚雍滌欺源太不平折臂輿情知顯報表閭公議得嘉名因令薄俗成淳厚鴈序怡怡免競爭灙水之瀕邑吏雍滌有弟源亦仕于官每為滌所窘源以長上事之恬如也滌源同娶梁氏二女家私微芒必較久之滌源為仇讎妯娌為寃對雍之父母弗能制也乃議析居欲留源之房滌不許俾源夫婦出一物不與責以歲時供奉無幾路逢源窘以不拜箠之既傷復訟於鄉大夫詰其詞理滌乃不直滌之妻造源之門曳乃妹出亦箠之曰法存長幼終不立幼而笞長也鄉議不與之儒家李華父晚景有爨婢出一子臨終囑華曰汝以為子華泣對曰是兒母雖賤華之同氣也他日華教飬之使之成材昭穆有序天可質也厥後名之曰蔚尤鍾愛之既長為名士為之娶妻華有子彌明先生於蔚十歲自蔚甫能言使彌明拜之及長禮待次其父一等華與子及蔚均為鄉人所舉達之太守上之春官論定以彌明官之彌明失言於蔚華乃撻之彌明伏義尋以家資盡付於蔚曰吾弟主之彌明自有祿飬矣鄉人以為賢秋社集豫在祭焉鄉人以雍李相況為薰蕕滌聞之罵坐復曳源擊之豫不平焉乃使直事紾其臂而折之滌妻尋亦疽發于手如此三年公私俱廢生事寥索父母相繼而亡滌與妻乞丐而死鄉人以為不義之報郡守旌華之閭曰尚義旌隱第五十九世情習俗最移人日用塵勞喪本真守道牟君天所佑輕身蘇子鬼猶嗔至言傳誦為規範廟食興崇致奂輪蜀士始尊中國教俗儒一旦變真醇蜀自秦并之後中國文物之盛先王大道之化漸有習之者矣而淳厚之風未振囂浮之徒競起豫恐傷風教有意欲化之一日巴郡宕渠士人牟麟好學不厭而樂於教人守道廉退非有大故不出户庭歲時起居有受謁無出謁貧甚而未嘗怨尤郡守溫瑀辟請為從事既不起丞于扆往邀之接語移時所談皆安時順便善身避世之語扆欲致守之意而辭不得達卒罷之扆以告瑀瑀嘉其節蘇尚功者嘗學於麟未終其業開門受徒以師自任而性好奔競足迹不少安求請省問奴顏婢膝為麟薄之或以麟辭達之者尚功踵門而辨之麟亦自以為嘗教誨之猶執先覺之義而語之曰死生有命富貴在天子夏之言也求之有道得之有命求無益於得子輿之言也子之所為吾實恥之尚功自恃少年拳勇擊麟豫適見之乃化一儒士為之解紛顧衆而語之曰人之壽夭窮達有命在焉非人為也奔競無恥不知命者也命之所無求之何益以常求之偶有所獲以為求則得之求益於得是不知道者也苟不知命且不知道則所守既喪放辟邪侈至於不正不忠不孝皆由此也二子所為冰炭君子小人之所以分也觀者駢闐或問豫曰爾為誰曰豫所謂張仲子者衆驚愕相視間豫隱形不見自是遠邇聞之者若尚功之徒改行有醇厚之風焉渠人為豫立廟祐正第六十謀他財賄巳非冝況復萌心苦見欺正女一言祈響報吉人盡室免傾危俄驚縲紲皆離體尋使𠒋強總磔尸福善禍淫天理在非豫受祭報其私北都冨室智全禮中眷修祀一室盡醉暴客王才者約其徒三人謀劫之是夜未央推户直入縳全禮家男女良賤九人婢妾七人唯全禮之妻與二女容繫之既取其資將亂之全禮之妻惶懼乞憐幼女舜華年十五與其姐舜英抱母而泣才欲逼之華罵曰餓賊犯吾家張神君未知汝也語畢其家司命崔瑄與智之祖禰告急于豫豫乃遣功曹輔興領陰兵百人治之所縳全禮以下繩皆自解盡執其賊翌日告於里正聞于郡悉誅之梓潼帝君化書卷之三
